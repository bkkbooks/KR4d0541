body:
  text: 羽庭集卷五元劉仁本撰序樂節婦詩序定海邑浹港里樂氏女静年二十歸為鄉人後海士族戴徳潤婦既六年生二女而徳潤蚤世樂慟絶者㡬既治䘮盡禮及葬之日欲身與柩俱窆其姻戚强持之不得遂而止廼廬墓側日抱二孤女以號指天以誓治絲枲以自給人不敢以非禮語及之者霜露晏如寡居二十有五載今齒五旬矣且能教其庶子從明師向學讀書不墜先緒有司上其事旌之鄉之為士者咸歌詩以美之徵言於天台劉仁本曰鳴呼夫婦人之於夫也一與之醮終身不改者以禮與義行乎其間也即不幸而夫死又有聖人為之法制存焉婦能守制而行則為賢矣豈必以同死為得哉且聖人曷嘗教人以夫亡而婦必死也亦日未亡人而已今樂氏臨其穴欲以身殉情則厚矣親戚止之而止其亦止乎禮義者止乎禮義而不謂之能守制可乎前史官程君稱其誦孝經小學書列女傳論語孟子皆通大義父兄有隱徳若婦者誠有得於詩書之教父兄之訓乎余往嵗見危太史傳婦叔樂夀孫妻哭得夫屍於海濤中葬之終身不改事嘗為賦詩何樂氏婦人之多賢也於是喜為之叙而又詩曰海岸愁生雲黯黯柏舟誓死淚漣漣夫今蚤世悲長往妾未亡人漫自憐二十五年幽夢隔一雙孤女夜燈前樂家門表多賢婦一度題詩一悵然送河南省員外郎梁子晉使還序自海内驛騷國家用武先忠襄獻武王爰整義師奉辭致討既覆賊巢于汴尋定燕趙齊魯時乃勇臣驍將智謀多士赴功名之㑹者飈馳雲集有若河南行省員外郎子晉梁君起身經學備文武才實佐戎行所以賛忠襄集大勛者凡選徒調兵發縱指示與夫供給士馬之需攻守備禦之略奉周旋明典則言無不中策無不行數載之間三軍之政厥有頼焉乃至正二十有二年夏五月司徒江浙行省平章政事方公統舟師駐四明聞忠襄舉兵益都聲援相接遣使乗桴浮海致書幣于營道軍旅之情請期約之令以遂夾輔之謀比至則忠襄甍而令子太尉公襲職總戎矣使者奠告於繐帷復白太尉太尉視諸館穀於禮特優于時益都未下山東未定議復報使實難其人既而曰莫子若也子晉舊為我先王倚重知我先王之心諗我先王之勞可以暴白于四方者其子晉乎於是命之南行仍侑諸别使者泛舶而來其年冬十有一月至自海上見司徒公于分署司徒與之坐而問焉其答也如響其儀也可度於是先忠襄與今太尉之情孚暢于前而軍行之務師克之期刺刺唯諾間使乎使乎未㡬益都之捷報至山東之能事畢君子謂子晉可與訂盟也矣信宿稍久而得以觀夫南越山川之控制水陸兵旅之聲容瞭然心目司徒復以江南事機閫庭謀略託諸子晉以復于太尉而俟其報命之重來也子晉旋矣凡在餞席為詩歌以壮之謹書鄙言于簡首送中書兵部員外郎富察君使還序朝廷以興兵討賊之事屬諸中書平章令忠襄獻武王則為之開分部于外以賛武功曠古所無斯兵部郎官富察伯貞氏所以列署行營也夫兵部者即古周禮大司馬之職掌以九伐之法制軍詰禁以糾邦國今則兵籍軍器鎮戍廐牧驛程通道郡邑圖志阻險危塞之事悉𨽻之固宜其分天子六曹以佐王師矣至正二十又二年夏忠襄既定兩河南北復取山東駐兵益都而未下于時司徒江浙平章方公出師鄞海遣使贄禮往問兵政㑹王薨在殮使者既白事于王之嗣子太尉公已而将還太尉議報使且曰吾行在外所以致先王及我之情悃者吾有吾幕職梁子晉在焉夫欲致朝廷措置之宜與責任之重者非朝廷人不可也矧有如行兵部員外郎富察伯貞之賢足任使事乎宜遣之以逹朝廷責任先王及俾我襲職總戎之意伯貞與子晉遂並使浮海而來既至左右専對唯諾惟謹使命之禮軍旅之議交懽之情懌如也伯貞世惟金源氏貴族其先多忠貞寅亮而伯貞雍容儀度進退可觀於戯自四方有事吾閲奉使者多矣或将命或交際或集事期㑹率皆倉皇膚略未有如伯貞之委曲周旋能盡所職也且盤桓乎甌越台鄞之境於地理圖志山川形勢封疆限域軍旅事機備有識焉可謂得皇華咨謀詢度之義矣今而還復於太尉復於朝廷者又豈有扞格而假辭令之云乎哉伯貞請贈言輙書為之序白沙聨句序白沙聯句餞尚書貢公也公以至正十九年冬董漕事于南海道由錢塘經越絶浮鄞舶入閩廣門生故舊散處外方者凡若而人胥㑹尋盟鄞海上祖于白沙之滸酒闌情洽不能舍去因宿留舟楫間各出肺腑語聯句以餞别余觀聯句起于唐人自韓孟以文字締構或其情辭之交暢或其才力之匹偶逓相磨淬鍜鍊險恠組織瑰竒聨絡以成句錯雜以成篇世之人罕為之者顧筆力有不贍耳至若㑹合之篇則昌黎南遷召還為國子博士與孟郊張籍張徹四人者㑹于京師時作暌違合并情歡辭洽不能自己今此白沙之集其揆一歟盖公以文章之胄世掌詞林延納四方士子故學者多出其門離合攀戀之頃著乎情文之美有若此者公嘗自信他日復遲予於東海之上握手道舊把酒臨風又見吾黨交誼噫方今國家文章槖鑰虚席以待公歸公且北還又安得不有如昌黎㑹合之作者乎余惜不與前時白沙之㑹尚想他日為都門之迎候也季章徐君以鏤本示余請叙故輒為之引言云送浙東憲史陳道長考滿序風紀之司用吏馭法必求諸儒故其額員叅以鄉貢進士及諸學校官之在選需次者盖儒者持誠意正心之學舉而措之禮樂刑政皆光明正大之道有非刀筆鈎距缿筩之所知也矧風紀為百司儀表亦有不善抨擊糾治不少貸吏持三尺牘以較是非黜陟不有挾儒術者濟以光明正大之道而獨任刻深文法又可乎憲掾陳道長簡齋先生之胄䂓行矩步之儒盖學守其家學而亷則守其家法者也凡三歴學院正長而得嘉禾郡博士皆以文學亷慎見稱故豸冠争羅致之頃當離亂又能集武事領義卒治城郭樓櫓以禦冦攝職司縣勾稽出納積算絲縷芻粟以餉士馬厥功茂矣暨持憲牘則盡用儒者術飭已治人皆申周公孔子之訓而著光明正大之道上官不敢視諸鴈鶩行屬吏服其麟趾騶虞之懿余佐分省來東浙屢接論於幕底甚加敬焉今書考奏滿將謁選于京故為祖道效古人贈言述其梗概表其實學以徵諸搢紳文獻當敉寧圖治之日政崇儒用士之秋庶㡬信於朋友而獲乎上者吾見道長之登庸也必矣書為序送楊敬修赴都序京都集四方衣冠禮樂人物文獻之懿大而文武風雲之際遇小而一善一藝之不遺故凡君子有志當世者悉置身輦下以備采擢以利邦家暨登庸則不計位之崇卑不擇時之利鈍不顧身之安危惟務行道以濟世而已彼或事機有不合吾道不可行亦豈與世浮沉與時升降而徒為齷齪以䘮吾之抱負哉金陵楊敬修氏江左文獻也尚志讀書氣岸逼人嘗逰京師出入天府名重搢紳間禮樂衣冠文物之習日接乎耳目而議論風生儀形表著至正十八年當天下多事㑹廷命䑓臣奉使經畧江南持循國家故典以寧敉圖功選敬修掌掾事時道途阨塞乗海舶而來駕風濤之險挾蕭曹之牘分殿陛之憂于浙于閩于江左将周歴按治既而軍旅政刑芻粟之計與向所預定者稍迕若罔攸濟然山川形勢版圖内外人民土壤之宜則固瞭然識察于胸中矣比使者返命敬修已先辭謝留諸四明日與大夫士盤桓正言讜論激烈慷慨不能鬱鬱久居又浮海而還凡所與交為歌詩張之來徵余言余因與之道時務如今者兩河既収山東既復王師過淮醜孽不足殄也須平定之後措置設施修明周官紀綱法度由宰相行之亦在臺諫執議聞前經畧使者復居諫府凡所以敉寧之圖治安之策敬修往見顧不以前日所論者為江南痛言之乎吾知其志氣之激揚勲業之立就也必矣若夫旅進退取資班慮得失以為功名富貴地者吾不敢為敬修發焉河朔訪古記序今翰林國史院編修官果囉羅氏納新易之自其先世徙居鄞越則既為南方之學者矣而其逺逰壯志常落落于懷將以馳騁也乃至正五年挈行李出浙度淮遡大河而濟厯齊魯陳蔡晉魏燕趙之墟弔古山川城郭丘陵宫室王霸人物衣冠文獻陳迹故事暨近代金宋戰争疆場更變者或得于圖經地志或聞諸故老舊家流風遺俗一皆考訂夜還旅邸筆之於書又以其感觸興懷慷慨激烈成詩歌者繼之總而名曰河朔訪古記凡一十六卷其博雅哉徴序於搢紳先生若許安陽黄金華危臨川余武威諸公者論説盡矣復以示余余南産也於河朔古今巨蹟曽未之見間有所聞而又未為之得不敢妄有指摘然獨愛其於人京都國家之典禮宫署城池廟廷祭享朝班鹵簿聖徳臣功文武士庶一代威儀制作尤加詳備非惟後日可應史氏採摭將百世損益殆有所據焉於戯吾諗其㳺覽之時乃歸之日黄河南北已有賈魯畚鍤之擾而民俗稍為搔動矣然其所載則皆追述盛時之事不以少變而廢也昔太史公周㳺天下厯覽名山大川紬金匱石室之藏故其文章雄深竒偉今觀易之之作庶幾有焉其膺館閣之召而為史官也不亦宜乎至正二十有三禩昭陽單閼之嵗蕤賔節日奉直大夫温州路總管管内勸農防禦事天台劉仁本序送吴仲明赴廣東帥閫經歴序廣海在南服萬里為天子外府聨属島夷聚落作大藩鎮賈舶所輳象犀珍珠翡翠玳瑁委積如山人罔市利則商民雜處故禮讓之風少而趨競之日滋我朝置帥閫旬宣得人則易治而樂被聲教之中在承平時選任之法以道逺人難朝廷率遣官往授若職更相為治有人民焉有軍旅焉政事無大小悉綜于大府受約束奉期㑹故大府之任為難宣帥而下為幕職幕職之長為經厯則經厯者承上接下咽喉管轄視諸職為尤難也矧今多故山海弗靖水陸之運閉澁不通間有竊發人民軍旅為之煩擾聲教或梗耳目弗周遣官往授之法不行則朝廷署吏又斷斷乎難於得人也已今大梁吴君仲明奉命出為帥閫經厯諗得人矣仲明讀書尚義當荆襄有變嘗為海北帥閫從事以勞受賞秩後來江浙丞相開府承制遣諭平江既集事署為富州貳守需次僑諸四明余在戎馬間識其為人聰明俊爽議論多合時宜而今司徒平章方公尤所愛重將航海以赴廣東任凡所與㳺者作為歌詩且來徵序於戯仲明年甚茂學甚充數十年間厯練事機從容政務有不待言而諭其人于人民軍旅盖所優為而象犀寳貨力役之征亦在所不論矣入其境幸為問貪泉之酌近有如君家隱之者否乎又復有如區冊輩能過海而來談詩書仁義者否乎明年風舶南來庶㡬有以教我乎書為序平益都詩序國家承平将百年寛以御衆仁以行法文恬武熙弛張之道息而姦宄愒玩之心生循至冦亂蜂起毒害生靈民物墊溺天實厭之下有文武長材間氣所鍾為國佐命撥亂反正膺任大事上下豪傑匡扶社稷者不足以成不世之伐功故忠襄獻武王始由義起欽承天子明命錫之節鉞握爾重兵二三年間奉辭攻討有征無戰招降受疑從宜制勝首取汴梁定兩河南址繼下山東連百十城獨益都負固不悛元惡大憝逋逃逆命顧乃待以至仁示以不殺遲以嵗月俟其順化自拔來歸孰謂田豐王士成蠢兹醜類既已送降蔑視恩威怙終復叛出諸不意倉卒間王薨于外宵旰貽憂天人齊怒憤生遐邇既而王之令子今太尉中書平章詹事樞密公縗墨從事偏禆用命戍卒齊呼同心戮力復君父讎廷議褒崇舉行盛禮仍奨世勲命公襲爵總戎不數月間遂平益都田豐士成梟首碎屍臡醢以禡餘冦馘滅或割裂以徇或檻送京師弔其人民宥其詿誤散其積聚賑恤賚功於是人咸曰忠襄有後惟西平之有子矣嗚呼天之祐人主也當大運否塞得一賢將足以安邦定國固為難矣而况於兩賢繼出聨蟬接武惟忠與孝萃于一門而又英雄豪傑智勇相成同功共濟豈偶然哉昔周室中興生甫及申維申及甫維周之翰四國于蕃四方于宣而下又有如召虎之平淮夷方叔之伐荆蠻者焉故宣王能興衰撥亂復文武之境土定東州之大業今而元戎世勲重臣宿将不使甫申叔虎専美于前則夫淮冦既定四夷畢來而大江東西湖湘南北為不足以當俘馘矣抑聞公尊儒重道樂取諸人以為善凡疏附奔走先後禦侮者卒用忠襄所培植與夫廟算成策皆謙讓不遑必曰某之謀某之功而不自有焉偉哉甚矣宜其克集大勲也虞書曰汝惟不矜天下莫與汝争能汝惟不伐天下莫與汝争功其公之謂歟先是公嘗遣官浮海東來報司徒方公之使及兹言旋鄞人引領壺漿迎望王師之至者作為詩歌因之以獻且來命序余不敏輒為綜其端云至正癸卯之嵗二月望日天台劉仁本序送浙西憲府譯史徐子信序世皇既握符啟運尚文華之治廼命國師帕克斯巴創為國字以著一代之令典所貴乎别號令新耳目而逹四方之音譯也上則王言制命綸綍渙汗符章篆刻下而官府案牘之防閑絲縷斗升之出内政刑兵戎之調發悉用其字書以著標目稽考焉故為之建學官俾天下人人習之以備選試然於習學中而精者為難得四明徐子信氏英年妙質讀書有聲以南方之士而能紬繹其辭語馳騁其字書受辟浙西憲府為譯文書史凡時之亷問史者愛其文華資其唯諾而又雍容和緩禮貌盎然見者莫不歎羡至正二十三年夏奉􅊾過浙東而伯氏子仁又為浙東憲史治在其鄉昆季聨蟬金玊輝映鄉人榮之惜其旋也為歌詩以餞問序於仁本夫君子之觀人當夷考其行而後視其才猷自余來四明於人之言行才識多所臧否而子信久行在外不得與有知焉然嘗聞其居家孝於親而恭於兄兄弟怡怡上堂奉滫瀡歡然悦懌及為吏而能亷介慎恃安於其分得禄雖薄悉為親夀人無間言此其孝悌之行卓然可敬者孔子云視其所以觀其所由察其所安人焉廋哉余又嘗見其賦詩俊楚染翰清新信多才多藝者惜位未足充其學耳功業勲名深有望於後日焉始為之序虞江宴别詩序至正二十有一年秋九月有㫖以中憲大夫袐書卿召前户部尚書貢師泰還時尚書奉使出閩廣䂓治漕粟曠日已久盖上方宵旰簡文武僚圖理中外思得儒臣掌祕府事故有是命值閩有難稍阻未克進越明年七月始發行次四明将浮海以逹㑹丞相開府更欲得公參决大政遣吏候察􅌽迎之公曰禮君命召不俟駕吾行已遲矧重違乎然丞相以便宜從事掌持方面進退百官義不得不往謁乃别具舟取道餘姚江上往抵錢塘凡在門生故舊合鄞越士咸樂公至叙間闊接慇懃語孚情洽不能舍去遂扳戀出百里外泊虞公小港憩永樂僧坊酌醴為餞或有進於公曰昔公居館閣與遷外任率罄誠盡職暨登户部為國治賦遭時艱經營漕事奔走風濤瘴沴不知疲勞似非所宜今歸領祕閣圖書東觀清淨無事乃得閒暇優㳺安佚養性一何幸也請為公慶余曰不然祕書天子御府也公實宿儒耆徳世掌絲綸為國老成祕府所儲上而天文日月星宿之占歩推術數之驗古今帝王紀録禮樂律厯政刑所起與夫寶謨大訓丹書誓冊河洛圖書皇極疇範䜟緯靈瑞禎祥災異之符下而地理典籍版圖刻志山河民社華夷疆域職方所掌經畫沿革金匱石室之藏牙籖錦軸朱墨校讎世運通塞之所係簡閲奏進政有資於今日之治道所以備顧問徹清覽動聖聴執持縷㭊箴規辯說於上前者非公能之而誰歟而謂公可扵此暇逸自安歟必如若言非所以處公也又豈國家所以責任之意哉維是援天禄石渠之典據瀛洲羣玊之府遡奎躔東壁之輝穆穆迓衡以近天子之光者公志也亦衆所属望於公也公應之曰諾某雖老矣敢不思所報稱於是驩然相與劇飲取前人詩為韻各出情思分賦得二十篇篇十二句裒為宴别之什仍引鄙言以冠諸篇端為叙是月望日天台劉仁本書樵吟藁序鄮之佳山水萃于東湖人物多秀抜儁偉在唐宋時逹宦顯仕冠盖相望尤盛于宋季更化以來率隱徳弗耀然猶事詩書以淑其身以及其後學子弟地有書院一區祀徽國文公而缺主領余嘗為屈編修馬君易之攝行祠事其鄉之負重望者為髙先生岳盖宋武烈王瓊之裔美髯秀目儀觀丰采有若神仙一日易之持其詩數百首詣余曰此吾師也蚤年嘗假館授讀同業者多擢科躋仕師今老矣年踰八袠尚能書鍾王􅘁楷以授學徒積所作成帙命求子叙余觀其賦善鋪綴五言敷膄而實七言質而不靡長句悠揚潔鬯無事彫琢皆有唐宋風度富哉言乎然易之以善詩得譽足可傳世所得者果領悟于先王之授受果馳騁于先生之軌轍則當推而奨之以尊所聞行所學顧乃有請于鄙陋以發揮其藴何哉嗚呼氷生于水青出于藍固有不得置擬議形容于其間者然亦豈邴原所論登山采玉而謂不如海之深入海探珠而謂不如山之髙耶毋恠乎徵序于余也易之起謝曰有以夫遂書以遺之庶㡬有信于來者故序送韓致用之福建謁先廟序至正二十又二年余拜永嘉郡守之命及祗事大懼學官廢弛人材散逸干戈暴横俎豆弗修青青子衿挑逹城闕坐皐比者率藉威武以進而章甫縫掖塵氛蓬虆實有憂之既而廷署㑹稽韓君致用來為博士君故宋魏國忠獻王十世孫也詩禮成家讀書有志且能辭章又多内交海内文士為搢紳先生王公大人所愛重今典郡庠克膺教事而余何有前日之憂矣方與之上下議論商略古今収拾人材以備作養則余與爾其殆庶㡬未間忽請曰永嘉去閩為甚邇温陵與建安二郡有吾忠獻王與中書令公廟在焉盖忠獻實生於令公守温陵時令公有恵政人徳之後以諌議大夫召還道建而卒於建陽驛以故温今有祠宇暨忠獻秉國鈞澤及南服温陵人謂其毓秀之地又并祠之後有從孫徽猷直閣似齋大理主簿詢齋二公俱受道學於建延諸先生殁亦得從祀于學廟凡此者皆吾先之懿今將展謁祠下行有日矣敢請以言於戯宋之衣冠文獻自渡江以來南北播越道里懸隔陵谷變遷松楸蕪穢盖有不能省其丘墓者矣然而子孫欲致其愾焉愀焉之思盡夫雨露雪霜之情獨以仕宦江南恵澤在民民懷弗忘祠而祝之者在焉或因之可得而追慕也余往試吏南閩時嘗讀梁公克家劉公克莊所述韓中令忠獻二祠記并見其石刻遺像起敬起慕而弗果進登乎堂至今為歉則於君之往寧不有盡然於中乎竊聞忠獻王當宋盛時兩朝顧命三世元臣出将入相徳業勲烈著在簡冊然麾節所至如西京京兆秦鳯太原真定維揚定武相台皆有祠廟或于學于鄉于社于佛寺于道觀一一具瞻而晝錦醉白二堂及塋阡之在相者尤為表著其間嵗月頽謝風雨震圮或罹世變而文翰詞章光儀典刑落落不冺頎然可考彼泉南遺迹特一二耳子歸而求之秦趙晉魏之間不既多乎又聞嚮者子之曽叔祖立道先生及子之兄致寧君皆嘗一往安陽省謁先塋見諸父老子弟靡不涕洟咸謂其崇徳象賢文獻足徵搢紳至今譽之矧子之才之美温然儒雅可繩其祖武哉九原可作孝孫有慶子之朂之毋陋余言說叟叙說叟者括人王宗海氏也樂易和平為鄉善士見而無不説之者謂其長老故稱之為説叟云浙省左轄番昜周君伯温篆其扁來徵辭天台劉仁本曰説喜意也凡樂皆由説而後得説在心樂在外自非得真樂者不足以為説也叟平昔在子孝在兄友在朋友信在吏寛而亷在學勤而實其事上也敬其使下也慈其為人謀也忠樂善不倦見義必為雖横逆之來遣排以理無愠色怒意不忮不求不願乎外若此者則足自悦於心矣既飽歴世故即暮年倦於俯仰逢迎乃謀菟裘置身閒暇優㳺里閈逸樂林泉怡顔豫色以與山翁野老几杖杯盂或吟詩或歌嘯子弟陪從殆牧兒髫豎亦或相與徜徉其間暢然自得豈不真樂哉號之説叟也固宜又克教子子名時為壺金子者敦慤慎厚讀書能文章今省檄署為學校官嘗與内交因觀諸橋梓而可信焉雖然易兌之彖曰兊説也剛中柔外説以利貞順乎天而應乎人説以先民民忘其勞説以犯難民忘其死此王公大人之事吾不得為叟言之孔子云君子易事而難説説之不以道不説也小人難事而易説説之雖不以道説也天理人欲之辨君子小人之分請以為叟語惟叟其審擇諸至正癸卯閏月立夏日書為叙送謝玉成都事進表序朝覲廵狩之禮作而天子之適諸侯諸侯之朝天子率用符瑞以合信所以辨上下别誠偽也自符瑞之禮既輟而凡上之有事于下者必遣使下之報其上者必表疏以逹其情漢唐因之迨今而不可改也其在外服重譯以來職奉持者驛騎以進是故嵗時朝貢㑹同慶成皆稱賀而頒號賜爵大賚錫予皆稱謝焉上下之分以定君臣之禮以明誠敬之道以著逺近之情以逹甚盛典也國家承平有年廼者中原不靖亦惟二三大臣出居外輔蕃宣屏翰而朝貢㑹同賜賚褒嘉之禮未嘗少置至正二十一年秋九月上進江浙行中書省平章政事臣國珍爵司徒并賜署字玉璞惟司徒為古掌教之官而賜玉則古者錫瑞之義命既下司徒百拜舞蹈對揚王休北面而稱萬嵗者三即又熏沐浣滌召諸籖史述為進謝表章一朱墨校讎精潔函匭鞠躬百拜稽首遥瞻天陛激切屏營傴而言曰臣國珍不避鈇鉞昧死謹遣本省都事臣玊成百拜上遂以表授玉成玉成謹再拜受兢兢業業航海以進時則本謹告于使者玉成曰聖天子神武明睿念東南藩輔勲勞賜之爵賜之玊徳至渥也藩輔之臣夙夜是遑慄慄危懼不敢暇逸以辱天子賜惟是君臣之懿上下之情萬里之外邊鄙之諶惟一介使者之命是肅可不敬歟可不慎歟矧玊成出自詩書之裔禮義之門莊以莅官而選以充使顧不偉哉將見九重閶闔俞音之下而皇皇者華歸有榮矣玉成曰敬受教請書簡以遺某于是乎叙送江淛行省檢校官章君彦復序國朝署檢校官為省属者誠以檢詳法度飭勵紀綱且匡翼宰輔大臣所不逮也資班僅七品而關繫甚重視御史特少黜陟之柄耳凡選舉期㑹錢穀絲縷刑名賦役軍旅大小庶務悉從糾正執朱墨較是非以與宰相爭利害則憸者正繆者繩過者抑之稽滯者董之顛倒錯亂者釐而治之檢校之職斯盡矣今家國多故兵革四出所急者餽餉糧儲以足師旅軍國之用餘則振紀綱明法度肅官府之政令以挈人心而已鄱陽章彦復氏儒林之翹楚者也舊為淛省掾持史牘多所規畧至正二十有二年春奉命駕海舶督糧運蹈鯨鯢險阻出没風濤萬里趨京為國家廣儲蓄值倭夷冦海能挾弓矢力却無虞奏功庾氏扵是宰臣稱善獲進于上上嘉之視其人則端恪謹愿足任使令遂授以檢校官遣還諸省靖共迺職書曰徳懋懋官功懋懋賞其君之謂歟始君來四明登舟時余嘗領文武士祖張之固期其能陟巨鼇拜閶闔九重不避鈇鉞獻納殿陛以攄東南民物之疚以竭尺天寸土之忠矣今而果然得賞爵以歸且俾盡振明紀綱法度之職抑何余言之驗也故為之悦懌再率能詩者歌以送之庶㡬所以匡翼大臣輔成方面者君其勉乎哉餞長信寺經歴曹徳輔序自中原亂起滋蔓淮浙轍環既梗郵傳尼而不行凡京師信史下江南者率由海上浮桴以逹若徵漕運若責賞貢若治兵戎若親謀方面若咨詢於宥密若將命於相府若持大賚以賞邊勲動則駢肩接踵悉㑹於鄞轉而他之求其敏事識機温恭謹恪介然不辱命者間得一二人焉若長信寺經歴曹君其一也君以至正十九年冬奉命來趣漕粟并頒上所優江浙分省平章方公異數既宣布㫖意俾治舟轉粟未㡬丁内艱衰絰苫塊於松江之僑舍盖母夫人避地所也有若尚書伯公曹公二人者又各以漕事至越明年夏得粟若干石轉輸於海舶省臣謂始曹君之來也有王命焉爾雖在制中敢不共効力乎當起之以相與從事乃􅊾再三義不得辭時余亦在奔走列見君蓬纍慘戚舍於炎風烈日之下君復還居䘮次讀禮足不出户暨今免服從吉將復命於廷浙之父老與舊嘗所與遊者惜其去不忍别來徵余言為餞余曰士大夫行已立身惟忠與孝而已昔端木賜問士於孔子以使於四方不辱君命為對又以宗族稱孝鄉黨稱弟為士之次夫事君盡職謂之忠事親盡禮謂之孝曹君使出而遭母之䘮泣血三年極哀戚之情於亂離之頃又能勤勞使事以復王命忠孝之道盖兩得矣視彼匍匐而至冒黷以還與夫低顔屈意從諛佞苟且以成事者不可同日而語余舊聞君居維揚讀書仗義敬賢尚徳能延納四方士類故南北往來多譽之後辟丞相掾出入政府又優於吏牘詩云淑人君子其儀不忒遂因其行樂道其善書以勸於後之來者至正二十二年春三月上澣天台劉仁本序餞定海縣尹汪以敬詩序定海邑當鄞海口東接三韓倭夷島嶼南通閩廣畨舶商賈之往來編氓竈丁衣食雜居自昔為重鎮人慣風濤從事舟楫逐漁鹽什一微利少知禮讓詩書之教田多鹵下而劣耕非惰農斂獲常嗇不足民于庸功非所習則棄本逐末者衆非其才之罪亦風氣地勢使然爾在承平時撫字者猶曰難其任矧擾攘之餘瘡痍尚未易以甦而强梗者復怙其驕烈氣燄從而熏灼之由是善類不得以自植而惡者日益暴矣至正十九年省垣分署鄞郡念其民之瘵知進士馬君元徳之賢擢尹兹邑馭若衆寛若賦理若事不抑以苛細不畏彼强禦馴而擾之三年而政成政成而陞為奉化州牧則繼馬君後者斷斷乎難其人矣惟是省府復遴擇因得浙東帥閫都事汪君以敬代之君睦人也習儒書而敏于吏事舊嘗宰其鄉邑有政聲又能輯古訓格言著山居四要教其民利用厚生飲食起居以自全及為帥属攝職委積㑹計出内間雖毫末謹飭不妄今而往為定海邑則視其俗少禮讓必能教以詩書視其土田之瘠必能薄其賦斂而又剛不吐柔不茹則視前令尹馬尹之政為何有君行矣鄞士率為詩歌以張之來徵叙不得辭故為之言然至正二十二年夏五天台劉仁本叙餞将作院使曲有誠公序至正十有四年淮海漕粟不繼進於京庾廟堂有憂之廼今将作院使曲公任兵部郎中以明年三月奉制署海道防禦官于東浙事具親率其徒旅䕶漕舶千餘艘轉粟數百萬斛以歸上嘉奨之陟公侍郎而畀防禦為萬夫長錫虎符章篆尋以海道漕事盡付之後遂至領節鉞開藩閫原其始之經營調發措置規度一皆出自公胸臆時中原殘廢已甚禍延兩淛雖丞相擁大兵制以便宜從事微戰艦舟師掎角控扼則亦未能降屈由是漕運數年不輟且就桴筏為驛傳者惟公開海道防禦故以誠心結知之力也二十年公復自吏部尚書持憲節出為江南浙西道肅政亷訪使盖廷論以公先平章公舊嘗居此官恵澤在民久而弗忘又海邦日益慕嚮故有是命公既浮海而至道出四明詣藩閫相慰勞懇劬劬不翅如前日及視事耆老皆感嘆想見先公丰儀令徳至有泣下者以故民心悦之士卒畏之官若吏憚之丞相開府愛而敬之期月而庶務稍復諸舊簡在帝心二十一年秋有㫖以今職召公且命就董海漕還實由公能威輯舟師而敏于事機也予嘗以公之進止卜事機之㑹五六年一再往來于兩浙海道以通境土以奠邊政以和軍民以睦方面以寧東南之事思過半矣今而趨覲将廟堂之上萬幾之理天下四海之計大有所倚重歟公去矣海濱隱恤孰為亷問嚮之誠心結知者孰為恵迪苟去矣而利於邦家則殿陛之咨詢可否之獻替寧獨無一語一言及于此乎矧今懷徠江右事将就緒又寧無竒謀駿策足為東南計乎即東南之望于公者有素而攀戀之情轍轅之下不能自己故特推鄙信以進于公惟公其諒納之敢請至正二十二年春三月上澣天台劉仁本序西溪湖題詠序西溪湖當虞邑之西南鄙環堤以里計之盖四十有五焉水利之奪於豪者既復田賦之輕重徧負者既適均溝塍􅄵閘與夫矩度之防範者既周以密余嘗為紀泳澤亭以著民情之忻懌不忘矣乃至正二十有二年春正月其鄉老有章志安率若干人持繪帙踵門而告曰西溪湖之利病殆將百年弗治今一旦得參政方公檄韓伊上下詢謀悉心匡濟俾吾農民利其利而樂其樂誠有如子記言春而耕歌於斯秋而斂歌於斯者不徒曰感嘆而已盖即吾溪湖勝景有八焉昔放翁陸先生嘗標題之今将極其想像擬諸形容協諸情辭見諸謳詠使有引考猶覩河洛而思禹功也敢請序諸卷首按圖湖之東有長者山山麓新作祠堂旁為泳澤亭仙人魏伯陽金罍丹井在山後湖光晴嵐氤氲轇轕相為盪摩然以水之朝㑹於此築版閘時其滀洩西陲則瑞山屏遏回巒疉巘當夕曛返照蔚乎紫翠稍南為周嵒雄踞若獅子状秋月揚輝倒影浮光湧躍金璧又南則坤峯特出嚴冬積雪圭璋交炫融入湖間澤瑩潭潔自西而北匯塘巨浸水源春發揚波激浪散入溝塍以灌以溉鳬鷖之翔集鱗鰭之㳺泳藻荇蒲菰箐箐旆旆又防其淫溢更别為石閘以限之而湖心二培塿委曲蛇蜒斷隄連橋烟柳濯濯春和可掬凡此者四時之景不同而皆足為湖之助也至若樵唱咿嗚牛羊蒸薪出没乎雙溪之上漁歌欵乃鳴榔往來于任剡兩徑十二里塘之滸其樂概無盡也噫往者湖墮為穽而民受其害兹當擾攘艱阻之際而能披蒙薙蠧均田薄斂克集庸功先憂其憂而樂其樂特貽永久若然者人人所喜聞而飫道故嘉其請而為之述且以勵於後之長牧焉童氏家業儒七世居溪湖上盖始終湖事而孚信於其鄉人者也送馬侯元徳任奉化州序鄞為東浙甲郡馭二州四縣之衆於今為難治者在縣惟定海而州則奉化是也兩地界乎山海犬牙錯入遭時艱虞民與兵雜處驍獷之徒樂占赤籍得逞暴横以凌轢蹂躪為事善類無所容則負逃深匿山谷而居斥鹵者悉為馬御海豎怙勢挾威叱咤呵殿孩視州邑而託為侮禦奔走求能安田里出粟縷以事其上者盖亦寡矣朝廷重守令必選得若人而往撫治之於奉化得李侯元中為守於定海馬侯元徳為令馬侯世居燕山登進士第嘗辟江南御史臺掾耿介亷慎學道愛人故得選為定海其始至也民疑之侯能抑强扶弱鋤梗擿姦均而征徭寛而賦斂周恤其隱事有牽制即躬白于省故行不得弛而止不得昵一年而民信之又一年而民頌之三年而民惟恐其去則日赴訴而願留之乃今年春㑹宥府以幕職辟舉李侯州之為庶為士為農者從其父老趨詣省署曰吾州昔軫凋敝李侯甦之而未盡復侯今往矣将孰為守願得如馬定海者庶其撫我毋俾我讎於是省議舉馬侯往攝者從民欲也嗚呼古之賢哲不擇地而仕能與時而行民吾民也事吾事也盡心焉而已故有政績之著如龔遂治渤海化佩刀劔者賣而買犢鄧攸為吴郡去日百姓數千人依舟不欲返二君之事著在簡冊吾今於馬侯見之矣且定海去奉化僅百里餘民相若也俗相近也土田賦斂相髙下也絲縷力役之征無甚相逺也矧侯之善政聲聞又先入於民也即其治定海者治奉化将不必三載而功成考最其所書者殆又不徒曰撫字心勞催科政拙而已若曰吾治已足吾譽已彰而或怠於宦成者非吾所敢知也大夫士為歌詩且餞者若干人推余綜辭輙書諸卷右云至正二十有二年夏天台劉仁本序送户部尚書徹公通理趣漕回京序經國之制莫漕運為重自漢唐以來暨于我朝雖損益時宜實未有如今海舶之便利捷徑也故嵗當漕東南粟粒以實京師初由河渠轉達頗涉煩勞既而即河入江逡廵淺海為程稍易尋又訪得捷法駕大艘入洪濤巨浪度青黒二海水占春夏風候浹旬日間可逕逹京庾於是海道之便利雖罹變故而不可改也然而上供之數始於六七萬石漸加數十萬至甚贏羡三百五十萬而止亦惟驗嵗豐歉及約州縣委積因為制其多寡未嘗取必於定數倍蓰什百千萬也計其均科傍賦而吴地郡縣實當十之七八故又摠括其事於平江㑹府俾官若吏監臨之著為定制積有年矣邇者淮夷難興海島竊發漕運廢閣者四載朝廷既行宥典懐徠稍復乃至正十九年秋遣尚書來治漕事顧痼瘵未盡甦止三十分取一以一十一萬石進示開端肇始不廹而足也越明年尚書王公又至得粟一十三萬石竒視前則寖益矣二十一年秋九月有㫖賦粟百萬石於平江以户部尚書徹公將命公以科第起身光明㑺偉頎然特逹将不辱命既至即頒命及賜而太尉方且以士馬供億辭不能如數公正色抗言議論不阿力折不撓取必於足憤激莫渝太尉嚴憚瘖無荅語乃懇切於丞相以便宜從事得與尚書謝罪惟是丞相俯於調伏周旋曲折祈辭瀝命請姑進止如前年之數且伺後期輸償所負遂以粟三十萬石竒登於海舶行将北上衆徴言為餞余曰尚書古之納言為王喉舌出納王命職在機密未始輕以使是也今貢賦錢穀絲縷稽㑹悉𨽻户部由是國漕運出審得理矣然較所輸所得之毫末不翅太倉稊米耳一介下士遣之可也矧彼尚書是瀆哉矧今所輸所得迄無少益於前事時則彼自規為常數已即明年有征雖片檄可集政又不必一介下士之遣也諉諸相府足矣苟中原既定外版咸歸百萬王師破竹南下彼将匍匐奔命之不暇陳紅積腐又詎得自私連檣大艦亦不待我之責貢區區軍國鄙論誠有望出於此故因衆言及之尚幸告於執事者至正二十二年仲夏天台劉仁本序送户部侍郎韓君汝舟督漕還京序飛輓之法起於秦轉負海郡縣以輸河北厥惟艱矣漢都關中用婁敬議定河渭漕輓足以東制諸侯法稍加密故常漕粟東南餉給京都其始之用儉僅二十萬石而有餘迨久事弊益之數百萬而不足涉艱越阻所得不償率用斗錢以運斗粟雖甚勞煩而不可廢更歴世代而不可改劉晏於江淮作大艘艘輓千石者四百可致粟四十萬即淮舟不可以涉汴汴不可以河河又不可以渭乃各自便其操舟委折動經嵗年新故連續以逹固未聞有海道捷急之法也咸通間因戍嶺南行營廣州浙人陳蟠石始言海道饋餉自浙而閩可一月而至彼或宜之足免湖湘泝運之艱耳又未聞有涉大海而逺致南北者也惟我國家經營漕事始亦河運頗間闗勞役不數年而轉致諸鉅海有自來矣計大江以南治萬斛之艘涉千仭之淵歴青黒二水波濤掀簸幽怪叵測凡執役集事之吏與夫篙師舟子揚颿捩拖魚龍鼓舞出没瞬息南薰迅駃無旬日半月間逹諸京庾盖竣事於春夏之交而返櫂於季秋之候用力寡約而成效居多較諸難易萬萬懸絶偉哉盛矣頃以盜發汝潁陸途梗塞淮浙島嶼亦或震驚漕運㡬廢輟而尋復者将又三載至正二十有一年秋九月廷命户部侍郎韓楫趣官舶於鄞以轉漕又更别命官董粟百萬石於吴中期以明年春抵京師惟君以濟川之才器而又温其如玉動止威儀栗然可度山君海王靡不敬畏故度用舶艘若干悉如其數聨檣鼔櫂罔敢或怠及抵吴而粟則僅得一十三萬石有竒耳君曰噫嘻舟師之不戒則維我之愆彼粟粒之不齊我實非所咎吾竭吾力挾吾舟以濟肅将唯謹而已遂登於舶亟程以進揖别而去諸君出而祖諸海上盼睞之間奮迅風雲低回河漢拜閶闔九重而能吐鯁攄忠盡東南民物之隱豈謂在斗斛之末有足云者哉屬余叙言於是乎書筆海集序鄉郡學録孟君長文既没七年子士穎袖其平昔文藁徵序且曰先子篤志學業作為文辭積有年矣多散落他處穎不才所録者雖不全将鋟梓以行願有發揮余少時讀書城府侍古堂陳先生坐不習舉子業不及識鄉有孟君能文章既長出為閩海吏又不得與孟君㳺今而安得議論其間然觀諸墓誌曰凡所著論序碑銘詩歌若干卷名筆海藏于家及諦觀文藁則藻麗如詞賦典實如記序整飭如碑銘皆文字從容義理明暢援經析傳足以掇科取進而卒不遂何耶盖士之窮逹通塞命也然行業假文章以傳終不可泯者君子不謂命焉而既沒之後厥子能讀父書克紹箕裘桮棬手澤之存於此藁見矣又况於文字之可傳乎君黄巖邑人生而悟發頎然俊偉有志欲以文行振拔起家是以徙居郡城得在學校作養造就者四十年上焉州牧侯伯來往逰宦之子弟下焉凡民之俊秀與及門講授者衆故文字散落他處居多此編特其一二耳寧有不傳也哉至正二十三年春王正月同邑劉仁本序送台州儒學教授陳子章之任序始余讀書郡庠主外家王氏郡之録事判官陳君謹之時來謁見外大父公温恭端確持禮甚嚴及退請其故大父曰是郡前别駕鄉先生勿庵公令子也今藉䕃補此官以先公與我宿交篤不忘遺命父交子往之義故時來相慰勞余曰見今鄉之人得為鄉長吏鮮不負其矜莊而誇侈於其鄉者詎肯低屈下意時見鄉人之父兄長老話言而盡古人桑梓之恭乎今覩若人私竊敬而慕之因問其家世大父又曰昔勿庵先生嘗進大一統賦以文字受知世皇即命出使海外萬里夷國來歸遂入掌帝制代天子言後有姦臣搆誣謂翰林太常兩院議順廟成廟諡號弗稱擠之将加譴諸學士員公獨神色不變長跪奏曰周有成王漢有順帝皆為時賢君議諡者何非上大悦即抵罪而賚公及諸學士又嘗被顧問多所稱㫖嘉其敏對将老告歸除衢州别駕尋改台州余聞是語膾炙服膺至今弗忘暨後判官君提舉浙江儒學余出寓錢塘屢得親炙論議而想見其先公光儀判官君既沒之十有五年余佐分省署鄞君從子子章由教官辟浙右肅政亷訪掾以事來覿雍和謙退質直有守持憲不阿為上官所敬信諗能守其家法因又念夫提學君之如在也去年冬秩滿銓衡復署台州教授台鄉郡也昔之牧守者以得典鄉郡為榮盖郡官甚重有二上焉司牧民命所繫下焉司教風化人才之橐鑰今子章三世皆仕於其鄉政教休戚往者既熟聞樂道則來者方有望其優為豈直閭里之榮而已哉於其行闔諸餞者來徵贈言余告之曰台鄉禮義之邦大夫士淵藪人才如爾祖爾父者彬彬輩出衣冠文獻詩書典刑他鄉所取則子章久行在外今而歸掌鄉校見諸耆老成人則皆吾祖之友吾父之執所當敬也見其子弟俊髦則皆吾鄉之彦吾黨之徒所當作養造就也矧今時艱文弊四郊多壘而吾鄉之俎豆司存尚然鄒魯坐臯比進諸生論道講經當益力而弗懈怠也舍是三者余無以為言矣将見贊中興成禮樂獨不有頼於斯者歟子慎朂之毋廢余言至正二十有二年夏六月初吉同郡劉仁本書送物元阜上人序至正二十有二年春江浙省大丞相領宣政院事檄舊住錢塘西林物元阜上人主越之圓通寺時上人在靈源山中適余過餘姚方外交朱景純來徵言曰物元赴命幸公作一轉語以啓行李又曰物元精於梵書甚明宗㫖學出於息菴兹公又出於方嵒則公當時領袖爰有湛堂澄公者究竟宗乗為時宿徳四方來學者衆叢林中尤所畏服而物元多參受印者故其祖息菴以物元有得於湛堂之底藴乃命為之嗣若其後來出世振揚祖教惟物元為得湛堂正傳而不下於無極源繼絶宗者也噫余嘗至正二十年夏督旅道經明真寺訪支許舊迹寺西偏林壑尤美傑閣挺然松筠之表牙籖錦軸雜然前陳儒釋之典積萬餘卷有偉一僧具足十相方坐觀室寂乎不動五時八教心迹俱空無有滯礙退而與客作禮焚香瀹茗花隂竹影行雲流水灑然空翠間客亦坐忘及問詰而知其為物元也因示其所作五言詩多清適古淡得陶靖節體又出山中十一詠因俾余其二既去後則又來赴余續蘭亭之㑹于袐圖湖上尋益交往不輟盖其由儒逃墨而不忘乎儒亦豈昌黎所謂聰明識道理者而與余夙有支許之舊文字之契乎今而為圓通領袖圓通奉東海大士傳天台衣鉢為越上教首物元之主兹席也凡宗門之演説教乗之闡揚踞獅子坐一揮塵尾而户外之屨常滿者物元盖優為之余復奚言獨惜夫時世孔艱斯道方晦彼邪魔妖障紛拏雜出㡬何而不淪於惡趣者必有假於外䕶物元其審諸世法矣然在我者既虚明寂定則夫塵埃渣滓亦将隨化而遷抑又何尤是年夏四月初吉天台劉仁本序送大璞玘上人序佛宗有三曰禪曰教曰律禪尚虚寂律嚴戒行而教則通經釋典作其筌蹄者也自入中國歴代以來三宗之傳齊驅並駕至我朝世皇因嘉木楊喇勒智来希㫖陞教居禪之右别賜茜衣以旌異之實予其能講説義文修明宗㫖也始天台顗法師判釋迦如來四十九年説法以五時八教罄其𤣥妙施化弟子循循誘進由教而入故今宗門以教為重往嵗絶宗繼公法師承緒天台座下三弟子曰玘大璞曰乗大車曰焴大明皆甚深妙義而造最上乗者大明大車俱應世出又能與其徒振作宗風獨大璞屢辟不就屢屈不起盖其胸中灼有所見曰吾斯之未能信而出處非可苟也乃今至正二十有二年奉丞相檄文主越之雍熙席雍熙為雲門六寺之一地有若耶溪長松樹斑斑古仙佛蹟為越中最勝刹或曰雍熙自罹兵燹以來鄉者青鞋布襪之具悉為瓦礫煨燼之餘大璞不於往日具眼乃獨當離亂末刼而一出何耶噫是孰知大璞之志哉夫佛法流入東土當承平富庶之時無盲風疾雨嵗年豐樂蓮社盛行人人有見佛之念而在在為彼岸之皈大璞於此時出世則亦混乎衆人耳不有盤錯不成利器不有久屈不能大伸故三年不飛鳴者必将驚人而冲天矧今䘮亂之餘奔崩之際佛法陵遲刹塵凋落耆師宿徳間一二栖息於干戈風塵之表喑嗚鉗黙僅足自免求能以提倡表率後進作成來學不可多得大璞故於此時而一出盖閔夫宗緒之将墜吾道之不行思有以振起之所謂存什一於千百而拯毫芒於炎烈者也若夫炫境界之荘嚴夸金碧之焜燿從事土木以侈觀瞻以駭世俗以成外物而不究竟夫三昧宗㫖十六觀法華嚴塵苑方等般若法華與夫頓漸袐密藏通别圓之義漫為演説者非大璞所知也騎牛野人趙徳純來求余序固識大璞嘗為作明白閣詩知其人矣故書以餞之天台劉仁本序送陸徳陽攝東湖書院序由鄞城東行四十里為東錢湖湖之山水清妍人物秀朗有精舍一區始陸氏建以祀考亭朱夫子者也未得請額於朝姑因其地望表為東湖書院自舊為詩書禮樂之鄉文獻衣冠之萃人有士君子之行故陸氏之先慕道樂義割田置廟奉祀設教以其未得命而祠官之位虚率以他職來攝故其間有賢有愚或乆或暫不能以稱厥事焉至正壬寅南陽馬君易之以翰林國史院編修官需次於家起攝書院事既逾年而北上於是院之主領者又闕矣時則郡侯丘君彦村諗於郡庠曰今攝東湖者宜得慎修敬事老成之士莫錢唐陸君徳陽若也徳陽才華富茂踐履敦篤使其居攝庶其有成衆論韙之遂屈以往徳陽行矣天台劉仁本相之曰昔易之在攝余聞其能為書院振勵如創光進思始二祠招諸生擇訓廸嚴釋菜禮皆忠厚於其事者也盖人能𢎞道非道𢎞人矧君以明經貢士嘗歴西湖書院及教授餘姚此皆以學行著聞為時儀表而賢過之故不逃乎論薦而斯文之典刑在兹學校之教養有托矣君行其已驗之規往率方來之士吾見東湖之人習詩書申孝悌經明行修振策天府者必曰先生之教云衆咸歌詩以餞余并賦之
