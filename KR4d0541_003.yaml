body:
  text: 羽庭集卷三元劉仁本撰七言律詩杭州殄冦西湖十里頭廟堂成筭克神州六橋楊柳旌旗晚兩岸菱荷煙雨秋壯士椎牛呼白酒將軍繫馬醉紅樓却憐舊日笙歌地野水清寒滿髑髏至正壬寅秋八月因祀東湖書院過青山惠安寺登古鼎書樓留題一首行盡深山處處幽東湖萬頃水雲秋書堂陪祀人黄耉别院相逄僧白頭舴艋輕浮荒芡藕麒麟髙卧舊松楸逕山一景移圖畵古鼎清香書滿樓上虞席上賦城南花塢韶光好載酒吟詩不厭頻草色宜留金谷醉梅花别是玉堂春蛾眉窈窕羞為舞楊柳風流最可人行樂莫忘康濟念問君何日静邊塵壬寅燈夕原註辛丑冬得邊報已定中原乃壬寅嵗上元節四眀父老請放燈為昇平慶六街三市萬燈齊喜遇時清息鼓鼙閶闔星辰開混沌蓬萊樓觀出鯨鯢金蓮影動瑶階濕玉漏聲沉璧月低小閤吟詩還刻漏光分太乙照青藜又次前韻元夕張燈萬户齊嚴城㢮禁罷鉦鼙銀花火樹開金谷青𤨏香煙噴玉鯢簫鼓聲中春富貴玻瓈影裏月髙低昇平喜見中興業願得清光照藿藜昱上人出蜀僧與顧氏畵山水王元章畵梅花共一帙求賦有客手持三絶畵淋漓元氣薄層霄雲開南岳秋無際春入西湖雪未消野衲虎頭連二妙山隂鶴骨夐孤標已無秀色排青闥疑有寒香掛緑么正月望前一夕與滑伯仁煉藥委羽山中鶴墮翎老仙為我制頽齡人無金石千年夀藥有丹砂九轉靈候熟鼎罏分水火氣吞日月走風霆輕身已得刀圭祕莫問昌腸與茯苓贈僧鉉二首原註癸酉進士伊蘇達實䝉古人也仕至松州長亷介自守僑四眀竟坐貧以死而無所歸方外交復上人買地葬于寺西偏度其次子鉉為僧余甞於寺之天香室見鉉侍上人側眉目清膄能讀書頗嘉之且義其事為賦詩云渥洼龍駒來大宛䭾經曽踏祗樹園老僧買地瘞神骨稚子出家酬佛恩紺室天香生桂魄青雲髙義屬桑門此郎自是傳衣鉢况有詩書氣脉存雙峯老子能兼愛十嵗孤兒將奈何朋友無歸於我殯死生有託此僧迦一花新發優曇鉢孤塜還同窣堵波好向詩書修白業父恩師業兩難磨寄贈越中烏山間叟上人從復見心請也昔過慈湖知定水今聞定水説烏山神交坐石三生外地隔浮雲一片間天竺更誰傳貝葉雨花應自墮塵寰何時越上游方去却與吾師共徃還送竺曇上人歸天台巾峯四眀雪竇逢行脚五百天台應供身錫杖飛來南竺國曇花香帯石橋春擔頭孤月空挑鉢江上雙峯久岸巾問訊還逢諸老宿慚余猶是未歸人春興橋影横空卧夕陽山城烟景煥天章鶯梭織栁隨風轉燕剪裁花帯露香北去彩雲堆鳯闕東來紫氣繞扶桑征鞭日送韶光老野店孤眠月一床瑩上人道貎膚腴機鋒眀朗問字於余因字之曰玉蟾并以詩云眉端瑞相白毫舒塵刹三千總瑩如天上氣浮金沆瀣月中光映玉蟾蜍長生莫問姮娥藥靈迹曽成科斗書顧影始知身是幻廣寒色界浸清虛為閩僧郁上人題龍溪山房行卷昔年暫過龍溪寺寺後山房别有僧鼻孔直撩天地外脚跟遍踏水雲層頻伽小鳥來何有優鉢新花開未曽歸去泉南真佛國好傳大覺璉師燈題復上人為徑山悦禪師求歐陽學士碣銘行卷徑山天下稱名刹授記僧中識此郎乞與阿師藏舍利逺千太史得文章孤雲囘駐雙峯寺千里歸來一錦囊却愛遺芳傳桂子至今戒室有天香原註上人有天香室次韻奉答定水見心禪師一壑﨑嶇又一丘雙峯還憶舊追游風流此㑹人俱健感慨重來路阻修竺國瞿曇深丈室桑乾戍客念并州何當早見昇平業得與溪山共倡酬次韻答東山寺報上人東山西眺夕陽低悵望古人期不來政為危時多暴客何妨高卧隐長才兩江眀月潮先到一逕白雲門未開試問薔薇無恙不更須洗屐向山隈訪石梁寺松屏友上人翠松屏下訪詩僧欲問三生石上盟半榻清香留夜坐一牕眀月聽秋聲不知簷外雲來宿忽報門前潮已生眀日籃輿度山去後期須遣鶴來迎贈朽石上人蒼蒼古石出靈山元氣淋漓屭贔頑厓骨半枯龍虎死土花微蝕蘚苔斑尋常匡阜人皆到咫尺崑崙手可攀中有精英元不朽生公曽見㸃頭還榾柮窩陽氣潛囘小有天白生虛室蜃光圓茯苓根養丹砂火枸杞香生玉井泉不羨朱門堆獸炭尚憐青海起狼煙道人芋栗煨將熟紙帳梅花且自眠次韻答括蒼王熈陽王郎蚤嵗富文章氣燄應如萬丈長處士眀時當鶚薦羽林今日笑鷹揚豐城古劒横秋色赤水𤣥珠照夜光雲外傳來詩句好天葩為我吐芬芳次韻答括蒼王志學括蒼我昔訪山君芝草青田養鶴羣處士星躔開分野仙家丹氣走煙雲春風環珮時相過靈劑刀圭每見分東壁圖書光燄在他年應共㸔天文贈松江節上人每参栢子庭前意因訪松江湖上來雲氣玲瓏生石榻天花撩亂落經臺詩成茅屋同齊已字學蘭亭識辯才頋我慚非陶靖莭廬山空對白蓮開寄東湖書院髙訓𨗳教養東湖馬廣文諸生訓廸得髙君故家子弟多聰俊舊業詩書定策勲白首窮經人已老青燈考課夜初分休言苜蓿含朝日自是先生樂采芹軍中悼亷李二萬户豎子潢池敢弄兵勢方猖獗未能平輕挑遽䘮亷頗勇深入難為李牧精玉帳公曹嚴夜警金刀漬血泣秋聲何當一鼓蠻烟静洞獠畬氓雜曉耕秋日過倪仲權不值見其西席烏性善漫因清事廢催租數日虛過倪氏居一樹荆花秋淡泊半池蓮葉雨蕭踈園爪破玉浮冰椀野水通潮上石渠坐久論文歸路晚蟬聲還帯夕陽餘清凉寺清凉山色好樓居誰種長竿萬箇餘笙籟風傳虛谷響蓬萊地近瑞雲舒倚闌豪氣成詩句侵幌嵐光濕梵書愛此幽深堪攬轡葺巢何必定匡廬奉檄泛海督漕運風露雙清滿柁樓兩旗催發漕官舟銀河直下天傾㵼鐵笛横吹海逆流三四㸃星瞻北斗幾千里路到皇州白鷗不管人間事共此乾坤日月浮送户部侍郎韓君汝舟督漕還京喜見江南漕運開韓家公子濟川材木牛流馬隆中起青雀黄龍海上來影動雲帆拂河漢香浮霜粒璨瓊瑰蓬萊五色霞光曙翹首黄金千仞臺遊天童寺廿里松闗天下無朝元寳閣黄金鋪虎跑泉出澗花落龍過雨來山鳥呼四月八日逄佛誕千秋萬嵗祝皇圖玲瓏嵒畔太白下歸棹月眀水滿湖育王山外望天童一逕幽深廿里松天近翠雲鋪閣道風清碧落響笙鏞霏霏烟靄來雙鶴濯濯峯巒㑹九龍囘首岸東湖嶺上斜陽倒影濕芙蓉餘姚出郭憩横溪寺十里横溪似建瓴南雷古迹隐龍靈人家引水為舂碓僧舍開牕近畵屏鴈塚草荒霜月白鳯亭竹倚嵗寒青何人伐木穿深徑遍斸松根取茯苓遊餘姚姜山寺原註寺有鐵磬堂天籟軒山有白馬凌雲金鷄峨眉積翠五峯千年古寺倚蒼岷五葉竒峯秀色新積翠娥眉留夜月凌雲白馬逼秋旻山僧能説前朝事姜女不知何代人天籟軒頭聞鐵磬金鷄嶺上湧紅輪送陳子章赴台州儒學教授太丘家世出名駒典教榮膺鄉郡除烏府清風三語掾玉堂舊日五車書莫嗟子佩居城闕尚喜先人有室廬黄卷青燈須樂育新凉今已入郊墟送范啓之赴無錫教授江湖猶誦葯莊名有子青衫拜寵榮衿佩歡迎新博士塤箎相望兩難兄惠泉茗供公餘樂泮水詩脾分外清寄語徳齋賢太守好將廣厦納儒生送鄧行父赴無為教授向年東淛班荆數彼此公餘拂麈絲今日西淮呼棹徃溪山勝處著臯比人生聚首雲萍似客路驚心嵗月馳天地久長功業富鄧林杞梓㸔他時題上虞佛座峯慶善寺剡奥人家佛座峯何年易搆梵王宮赤旗天馬來山北烏膽潭龍出澗東古甃水花留芡雨小溪雲影度松風靈源野鶴時相過門外幽深一逕通上虞百官渡九龍寺原註寺有舜廟井呉越王錢鏐題以為舜親於此浚井遂賦觧嘲其墨迹存于寺中疏鑿功成萬國朝遂尊虞像鎮分茅蒼茫海氣斗牛下盤礴江流呉越交一曲山村龍九顧千年廟樹鵲雙巢人言浚井多遺謬敬為重華一解嘲上虞雲麓寺雲麓寺前春水發上妃湖外野航多一聲啼鴂僧房静五兩鳴騶使客過山筍斸來參玉版松花釀熟薦金波何妨醉後題詩句莫問空門事若何夏蓋湖山寺夏蓋山為大禹峯何年有此梵王宫吐吞日月湖光近出没蛟鼉海氣通烟靄滿空浮紺碧樓臺倒影濕青紅蒼生幸不同魚鼈萬古難磨疏鑿功長湖萬頃禹山前半浸烟波半海田以佃以漁風土樂為巢為窟水雲連門開日日鳬鷖到酒熟家家魚蟹鮮便作洞庭浮小艇扣舷眀月呌飛仙宿上虞鳯山長慶寺簡朱伯賢小越峯南見梵臺青山湖上鳯盤廻五雲樓閣蓬萊近百頃風煙舴艋來出水新魚供客饌落花啼鳥勸人盃與君更作峨眉約還逹眀朝霽色開育王寺阿育王山佛古廬平蘿蒼翠接平湖前峯玉几亭亭出流水金沙細細鋪古井鰻靈如􅔼蜴畨僧猊坐着氍毹寳光舍利時能現塔下青松飛白鳬四眀西山資教寺原註耆徳栢庭上人所住有袁文清公紀石雙錦亭臺隐翠微新篁乍脱錦䙀衣湖田萬頃青山繞野水孤村白鳥飛老栢未枯青尚在黄梅正熟雨初肥衲僧煮茗供清話玉乳泉頭汲綆歸原註地有玉乳泉寄謝𤣥一山人盛熈眀饋藥二首勾漏丹砂照眼眀黄金浮世若塵輕桑田幾見魚龍舞蓬島從教烏兎驚帝子齋居朝絳節仙家酒熟釀黄精相思多夢人間事一夜瑶田春草生曽伴羣仙謁帝京金銀為殿玉為城功名早遂身先退修煉長生業已成黄鶴磯頭行載酒碧桃葉下醉吹笙小蒼遺贈丹砂粒愧我凡身骨未輕過湖用前韻簡王叔雨磯頭流水小橋灣門外鳬鷖日徃還長見雲煙浮震澤絶勝風雨過君山冰田冷浸三千頃茅屋新營四五間叢桂幽居還自好尚憐烽火暗東闗丹青閣屹立芝峯㑹兩溪溪流環繞舊招提半間寳閣臨雲際一片紅塵隔水西夜静蓮香僧入定月移松影鶴驚栖丹青千古描難就萬壑風煙望欲迷癸卯正月迎詔于望春橋鳯詔頻年轉海來今朝喜見驛程催唐家褒將多忠義漢室求言極痛哀天上春囘芝檢下江南地復版圖恢好將鼓吹開恩宴四野同稱萬夀杯九日登高九日相逄憶孟嘉登高踏遍翠嵳峩杖頭春色催行歩屐底秋聲答嘯歌客路西風烏㡌破天涯南望白雲多東籬舊菊誰能采辜負淵明奈若何讀建炎宋師禹通判忠嘉集原註師禹錄和議秦檜患之謫使金宻令金人殺之師禹逃歸變姓名為趙復匿蜀青城山以死後髙宗褒贈忠嘉録其子事見宋史大夫出處最分眀禍劇還能變姓名奉使赤心懸白日遊僊紫氣壓青城江山千古羞秦檜鐵石幾人如廣平忠義可嘉傳信史感懐老淚落縱横擬逰禪樂寺舟行過門而不果龍山暫擬駐麾幢無奈歸心不可降隔岸馬嘶車廐驛艤舟潮湧丈亭江寳臺髙出蒼松並紅樹低飛白鳥雙折得梅花無寄處夜深和月揷蓬窗蘭芎山新創平眺亭我愛蘭芎紫翠堆岡頭為築小亭臺半空烟靄闌干外四靣江山圖畵開野鶴定巢松偃蓋仙人采藥路生苔風流不減東西眺康濟漸無安石才鳥人解嘲鵩鳥飛來止座隅當時却笑賈生迂仙都道士曽同化葉縣郎官詎可誣鍊得身輕如鶴瘦行來歩疾似鳬趨試從鵷鷺斑行㸔瑞世還應有鳯雛東湖觀勸農勸農持酒出東湖喜見田間民氣蘇桃李成蹊春爛漫郊原過雨土膏腴花邊立仗頻嘶馬竹裏行厨細膾鱸逺水野航人不渡夕陽天外下雙鳬中秋遊東湖登霞嶼寺東錢湖上值中秋載酒吟詩作勝遊一色水天涵萬象四時風月屬羣鷗馮夷漫奏霓裳曲太乙還乘蓮葉舟中有補陀霞嶼寺玲瓏樓閣似瀛洲題王粲登樓圖送李茂先司議昔王粲嘗依劉荆州不得志登樓作賦以寓鄉思今荆州中政司議李茂先以使事留四眀鬱鬱久居懐鄉之念如粲也既得歸友人作登樓圖以貽之請余賦詩曰江陵山水古荆州極目家鄉萬里愁念子豈為劉表客思親還憶仲宣樓胷中氣岸排風雨海上行程近斗牛聞説登髙能作賦楚人宋玉漫悲秋寄呈馬彦輝參議幾度書成寫不來今朝忽值片帆開京師喜得江南信幕府先從海上囘萬里乾坤懸北極一天星斗倚中台羣龍正是趨朝日康濟應須王佐才訪至道宫王虛齋真人不遇偶來車廐訪琳宫大隐屏前紫翠重路出山腰無十里門開溪上有三峯丹房霞氣如春暖茶臼雲腴帯露舂試問仙人何處去翛然白鶴下蒼松題孤山寺詩用林和靖韻處士清名百世姸故居今作小祗園神遊瀟灑風塵表詩刻淋漓雨墨昬山色湖光酣鶴夢月香水影弔梅魂翛然坐我荒祠下寂寞無從買酒尊次陸徳陽喜雨韻送别徃教東湖濟枯大作霖三日宴喜殊無酒百壺還憶故人來舊雨因知有客過東湖農功嵗望田中稼詩思秋先井上梧此際送君膺教育霑濡聖澤進生徒贈謝玉如山人三童山外白雲居中有求仙謝玉如一醉滿斟千日酒半生熟讀五車書丹霞琳館身曽到眀月冰田手自鋤漫採芝蘭過澧浦春風香拂舊庭除贈黄丹霞仙洞禱雨有應檄龍為我乞天瓢雷電奔馳神鬼勞萬寳欣欣䝉帝力千金滴滴飫民膏丹霞道士瑶壇啓紫鳯仙人絳節髙巖壑凉生秋思足瀟瀟萬竹起雲濤過上虞小越湖馬蹄纔過驛亭灣又泛烟波艇子還鷗鷺磯頭飛翠葉杖藜湖上㸔青山雙雙野鳥來天際短短新蒲出水間三十六溝春雨足一犂農事頗相闗題上虞長慶寺林壑尤美亭亭臺林壑知尤美極目須登最上層野水斷橋争渡客落花啼鳥坐禪僧五松舊迹俱層土一塔孤撑見佛乘最喜深春収積雨前山紫翠莫煙凝平江莎衣道人宋孝廟甞遣黄門問道塊然天地一籧篨晏坐神遊造化俱海上蓬萊纔咫尺世間甲子只須臾内庭自有真丹火大道何須問黍珠滿地春風莎草緑一聲長嘯脱凡軀贈無名道人道人曽也到蓬萊簸弄滄溟日月來昨日㸔山過鴈蕩今朝採藥度天台相隨白鶴時能舞自種碧桃先已開只恐放還龍虎後依然天上駕風雷送春無言桃李漫成蹊折柳紛紛絮滿隄富貴光隂蝴蝶夢别離風雨杜䳌啼歸心已逐梅花去望眼空迷草色萋何事王孫苦留滯天涯羈思獨凄凄傷春園林漲綠汛清暉澤國繁華事已非王母信傳青鳥去海翁機動白鷗飛漫從上苑㸔桃李擬向南山采蕨薇滿地落紅風雨後春隨杜宇一聲歸題馬易之韓與玉塗叔良上京紀行詩卷景運將興禮樂期邦家培植太平基鑾和法駕時廵幸扈從詞臣發祕思文物兩都班固賦山川萬里杜陵詩於今十載風塵裏展卷空懐草木悲題梅花三疊卷誰按胡笳出逺羌梅花三弄月當牕北枝未逗南枝煖兩疊重翻一疊腔腸斷玉龍聲第四夢囘么鳯影成雙東風更莫添嗚咽雪外蓬婆城未降題鄭克眀紀功詩卷徃嵗曽聞通政掾東甌鄭子有才名行逄樞要人推轂歸值鄉邦盜弄兵文事已知能武備邊勲還許繼家聲更煩為國陳謀算奪取江淮閫外城奉檄征漳冦虎節門前五鼓撾銜枚百萬寂無譁鞭鳴金鐙敲霜月錦刺銀袍映海霞化外無知如敵國軍中有令敢思家元戎期聽歌聲㨗奏藁應湏易相麻題東山西眺新亭二首兩眺東山迹未陳西頭重結小亭新謝安李白登臨舊支遁許詢來徃頻江水嶺雲還不盡風颿沙鳥自相親便當了却公家事髙卧林泉寄此身岡頭深翠竹交加西眺登臨望眼賒隔岸逺山開罨畫兩江流水學琵琶夕陽返照尤多景漁火炊烟更幾家為愛新亭成久坐梅花疎影月横斜餘姚築城傷心為問築城人今古曽經幾戰塵負郭長江流不盡履田瘠土税何頻龍泉寺外多風雨靈緒山頭泣鬼神落日歌聲齊萬杵將軍一劒倚秋旻胡宗器訓廸慈湖書院詩以牡其行姚江一見眼偏眀鄞海三年學業成天末秋風㸔劍氣燈前夜雨讀書聲賈生未可輕年少許劭還應重旦評今日横經慈水上菁莪樂育蚤蜚英送陸徳陽攝東湖書院天下盡崇朱子祀甬東新構陸家基攝行俎豆君同姓樂教詩書學有師湖上青山多爽氣月中丹桂憶髙枝眀年髦俊賔興日還見文章到鳯池送馬易之主東湖書院事湖水東頭見學宫教分黨術啟羣䝉曽崇俎豆祠朱子今喜師儒得馬融蠧簡青燈聽夜雨鯫生絳帳坐春風鄞邦自是衣冠藪况復書文四海同次韻南陽馬易之東湖書院雜詩十首年來經濟業空踈擬向南陽問草廬精舍荒凉重結構硯田蕪没費耕鋤青山屋上啼黄鳥流水湖頭遶玉除幾處故家喬木在趨庭子弟尚詩書悠然天地一閒身每對青山獨岸巾萬揷牙籖堆架數一椽茆屋住湖濵乘車司馬題橋處問字揚雄載酒頻啼鳥一聲春已去落花無數㸃苔茵海上蓬萊擬退休逺㸔蜃氣結層樓刀圭鉛汞同消息日月乾坤共拍浮聨句還應題石鼎吹簫曽見過丹丘人間萬事多風雨囘首緑林隂正稠晝静時聞伐木歌隔林啼鳥落花多酒邊白髪人空老湖上青山翠不磨上樹健童身似犢采菱遊女髻堆螺水雲萬頃迷雙槳一雨凉生鷗鷺波萬頃寒漪漾夕暉楊花燕子傍人飛湖頭水竹清如洗雨後桑麻緑正肥樵唱數聲山鳥和櫂歌一曲釣船歸蒼烟赤子騎黄犢斷岸人家半掩扉流水柴門暝不闗天邊孤鷺倦飛還草深牧子騎牛過沙浄鷗羣對客閒紅漲一溪花雨外青連數㸃屋頭山先生㤀却功名事斷送春光詩酒間獨笑先生莫已知索居還得與羣離草堂荒落誰招隐澤國生涯費不貲西極驊騮空伏櫪南飛鳥鵲嘆無枝石䦨干外瓊臺月我獨衡茆歸去遲芒鞋藜杖鹿皮冠迎候柴門稚子歡靖節陶潛曽仕晉友人李愿蚤歸盤床頭金盡還謀酒隴上田耕獨遺安花木四時生逸興蒼蒼松竹尚凌寒湖山買得不論錢小屋編茆竹作椽雅樂生徒開絳帳讀書燈火坐青氊故家奕葉兩三姓喬木連隂幾百年冠蓋當時相望處躬耕多是墓前田晨起還招館下生日長喜聽讀書聲門前白鳥自來徃屋上青山相送迎水滿池塘魚罟入筍穿墻壁燕巢成平湖雨過添新緑頗覺詩懐分外清月湖即四眀涵虛驛餞友人别月湖橋畔水眀樓繫馬涵虛古驛頭芳草春深人載酒陽闗聲斷客登舟四邊烽火將休息千里江山足勝遊如過天台經雁宕為余問訊舊林丘題古靈書院先王昔作吾鄉令人仰文章道徳尊白簡薦賢俱宰輔青苗論事盡忠言子孫尚見衣冠族祠宇新開禮樂門高節客星相對處共㸔清氣滿乾坤清心亭為定海尹汪以敬賦青山誰築小亭幽釣客來為百里侯退食自公携一鶴㤀機無事狎羣鷗此心已共滄浪水清思應涵天地秋待得風塵稍休息依然歸去理羊裘原註清心亭尹方來既作艮光亭又作此亭而賦之以寓謹刑之意御筆諄諄飭謹刑豈容偏詖失持平七條首示清心訓心地宜如冰様清過慈溪清道觀郭裏青山爽氣浮神仙樓觀出東頭兩江春水潮來徃五粒蒼松雲去留倚竹道人清似鶴懸崖屋子小如舟吟詩有客開軒座俯瞰烟波數白鷗送中書兵部郎中李伯貞囘河南軍中萬里乘槎過海邦郎官出使擁旌幢分符曽衛天兵下沿檄還招賊將降王室武功誰第一漢家國士政無雙東風鐵騎維揚岸儗駕樓船渉大江寄分省郎中趙文中蚤嵗曽充上國賓文章聲譽藹成均賢良策對三千字胄子臚傳第一人滿眼干戈愁正苦論心燈火喜相親丈夫有志崇名節莫使行藏愧此身送趙彦林謝玉成奉表進呈一封函上九重天萬里心旌日月懸重譯逺來滄海外靈槎稳泛斗牛邊趙家公子能充使謝傅兒孫况有𤣥却向中原覔歸路長淮聞漸息風烟送周譯史進表赴京驛頭官桞拂征衫重譯南來進寳函絳蠟小書封玉篆錦衣中使啓華緘山呼萬嵗龍顔喜仗立千官鳯尾銜奉職小臣思戀闕征颿早晚發黄巖贈蜀僧月鏡上人住白雲寺月鏡虛幽萬頃光峨眉倒影入巴江水輪滿駕來天竹寳匣初開印雪窗照膽清寒金在冶通身瑩徹玉為腔白雲座上天華雨説法真如鐘應撞送進士王好問浮海㑹試五雲深處望蓬萊王子求僊謁帝來北斗天中銀闕峙南薰海上錦帆開一聲臚唱風生蹕九轉丹成月滿臺宴罷瓊林歸去路杏花十里馬蹄催送進士野質中浮海㑹試天開閶闔近瀛州僊子朝元汎海舟溟渤三千鵬運翼瓊瑶十二蜃為樓乾坤上下風雲會呉楚東南日月浮好聽臚傳聲第一承恩早出鳯池頭送進士俞伯圭浮海㑹試賓興送子上皇州琴劍春風滿柁樓擬向日邊登虎榜先從海上占鼇頭禹門浪稳桃花暖月殿香浮桂子秋聞道鑾坡多雨露羣僊還許歩瀛洲次韻𤣥一山人盛熈眀八月十五夜同宿鄭䝉泉提㸃别館種藥長鑱手倦抛白雲眀月禮三茅未須姹女藏龜息還許山人借鶴巢玉屑千鍾和露飲瓊田萬頃帯冰敲却憐飛舄東湖上寫寄新詩方外交次韻寄熈眀盤谷歸來學散仙姓名只許野人傳軒裳去我無官守詩禮承家有子賢颷馭鶴羣天外下神光牛背日髙眠秪縁蠒紙留真訣賸寫黄庭注内篇苕溪清隐為晝上人賦呉興公子畵苕溪中有山僧構鶴棲席展波光春雨過林開霽色水禽啼詩人獨坐燒茶竈艇子歸來繫柳隄七十二峯如弁好幾㸔湖上夕陽低舟發連江館頭笑將眀月指為期此去應知半載違五虎門開潮正急一帆風𦂳棹如飛立沙舟子争先渡罷釣漁翁暫息機眀日重樓人望處江空嵗晚雁南歸聽簫為沈子和賦憶自吹簫出禁城沈郎消瘦覺身輕水雲縹緲青鸞下天地蕭騷白髪生婺婦孤舟空有淚仙人弄玉久無聲鳯凰覽徳今猶逺何日重逄聽九成題唐僧懐素自叙帖草書懐素夙名聞落紙縱横蛇鳥文應是墨池深嵗月漫從劒器走風雲清狂自儗張顛旭丰度何如王右軍多謝故人能寄我慚無道士白鵝羣中秋夜舟泊海門金鼇山翫月秋律平分夜氣清潮來月向海門生眼眀玉兎空中下人在金鼇背上行一色冰田逾萬頃九天風露欲三更恍然坐我蓬瀛底何處有人吹鳯笙中秋南樓賞月分韻得天字今夕中秋月向圓南樓開宴問嬋娟山河缺處無多影風雨妨時已十年坐客總誇攀桂子素娥曽記寫花牋更深十二䦨干外一色瓊瑶萬里天壬寅八月十七夜月湖上泛舟翫月望後秋髙月尚圓湖光倒浸水中天蟾蜍漫竊姮娥藥艋輕浮太乙蓮萬里山河微影動幾畨烽火㨗音傳十洲三島蓬萊近賀監風流獨悵然舟發海上縱觀溟渤暫來桴寫得波濤作海圖白氣微茫開混沌黒隂光怪舞天呉雙飛水鳥相髙下數㸃風帆或有無眼底蓬瀛三萬里烟霞縹緲見清都防運糧赴京二首一封奏下水晶宫南服車書喜㑹同天上綸音頒玉帛海頭蜃氣結青紅雙珠虎佩懸眀月萬斛龍驤駕便風莫問大江南北限涓流從此與天通偶隨餉餽上金臺姓氏那知格上台一㸃靈犀通海底九苞威鳯自天來賜衣香織金泥重錫篆光浮寳匣開螻蟻小臣思補報常瞻雲氣望蓬萊清風嶺王貞婦廟清風嶺上王貞婦囓指成詩帯血題字跡糢糊鎻烟雨廟祠幽寂照山溪偷生羞殺邊庭吏忍死寧為將校妻獨有當時文相國千年名節更誰齊舟發錢塘江滿城風雨渡江來倚棹沙頭潮未囘慘澹湖山悲鼓角蕭踈花柳廢亭臺呉中日報官軍㨗閫外時多將帥材秦望雲深行未得笑從海上過天台松下居為五郛長慶寺無盡上人賦五樹蒼松秀可依老僧結屋傍巖扉茅簷明月翠蛟舞茶竈青烟白鶴歸坐榻年深蘿薜長長鑱春煖茯苓肥採花釀酒堪留客醉㸔門前雲自飛泊定海縣招寳名山孰可招虎形蹲踞水來朝象犀珠玉通畨舶樓櫓旌旂捍海潮三港水雲天共逺孤城煙霧日初消官舟幾度出防禦目送征鴻起莫簫過慈溪縣山縣得名因董孝官中事簡不成衙慈湖人祀揚夫子東寺僧居闞澤家四野烽煙多斥堠一川雨露自桑麻海濱土瘠無常貢范帥遺殃獨賦茶過寧海縣寧川鄉邑路岧嶤髙岸春江帯晚潮戍海每從軍事急㸔山不憚驛程遥杜鵑風雨三更夢楊柳闌干十二橋啼鳥落花堪繫馬行人還赴酒旗招題瓊臺雙闕行從流水入天台悞酌胡麻飯一盃月下吹簫人窈窱雲深採藥路裴徊海波漫託枯桑變華表空傳老鶴囘翹首羣仙渺何處煙霞五色䕶瓊臺送商公禮囘鄉驛舍梅花春尚遲客邊送客故鄉歸中原已靖兵戈難南國初㸔鴻雁飛栢府孝亷傳義檄春庭怡悦着菜衣自憐飄泊江湖久何日塵驂賦式微草堂柳色幽人種柳柳成莊萬樹參差䕃草堂漫笑支離生肘腋尚懐陶令住柴桑黄金細縷春如海白雪飛花水滿塘九烈仙君應有意他年為子染衣裳
