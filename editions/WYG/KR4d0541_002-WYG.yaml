body:
  text: 羽庭集卷二元劉仁本撰五言律詩王生軍功得官監稅大帥開戎幕王生試六韜檄書連夜發劒氣倚秋高譚笑収羣醜才名壓衆曹如何受官賞只任繭絲勞問竹軒為禪寂寺一元上人賦試問高安信風煙近若何深林無客到地隱此君多鸞鳳時能下琅玕淨可摩老僧方止觀明月自婆娑黄節婦原註黄謙妻董氏歸十日而夫死育庶子寡居四十年竟不得有司之旌表石竇空流水閭川莫問津為君十日婦誓我百年身庶孽存宗祀閨門重睦婣却憐旌異者多是貴豪人閨情昨夜窻前月西風下井梧夢魂關塞隔燈影枕衾孤淚落啼螿急衣成過鴈無將軍功未就何日佩金符王烈婦原註王揆曽為瀋王府教授死京師妻董氏聞訃即引刀自刎不食數日亦死夫子王宮教音書逺莫聞日邊俄報訃地下即從君石竇猿哀壑燕山鴈没雲旌書来萬里合葬表雙墳靈源寺藏書西閣為阜上人賦松竹林邊寺西山爽氣浮昔開千佛閣今見萬書樓老墨明宗㫖研朱自校讎本來無一字寧羡鄴家侯東湖一帶山如畫東連百頃湖水腥龍吐氣月瑩蚌含珠畎澮浮香稻漚波没短蒲漁人撑小艇來徃疾如鳬倚杖東湖上行人鷗鷺邊幾番風雨度一曲水雲連勝槩多山寺膏腴䞉稻田芙蓉涵倒影蕩漾採菱船訪紫籜寺孜上人不憚青尖路來尋紫籜師十年曾記别一夜話相思木井泉甘處槎山茗長時月明誰入定門外鶴歸遲題清暉軒湖上軒亭好幽深凈可依櫩楹涵倒影風日漾清暉濯濯蓮如水娟娟竹近扉紅塵渾不到坐客亦㤀歸茶洋驛次王伯宏韻晚泊茶洋驛塵勞暫解紛龍光騰劍氣鳥跡印沙文憩席沾疎雨回帆没斷雲故人為使客聲息偶相聞四明涵虛驛涵虛湖上館賀監舊亭池明月浮金水㣲風動緑漪雲林殊不逺煙雨更相宜欲解塵纓濯慚持使者麾中巖寺城中山作寺山外水為城未得逢僧話先聞啼鳥聲溪雲將雨過竹筧度泉鳴自愧塵纓縳空勞野鶴迎龍井寺禱雨詩二首天井龍三窟危峯翠一拳化身分蜥蜴嘘氣出雲煙水積他山堰田登大有年今當赫靈異霶霈荅精䖍攀蘿行鳥道絶壑見龍湫嵐氣千峯雨溪風六月秋冷泉移别井古寺翳深丘獨愛他山下梅梁積水浮原註梅梁事吳孫權伐四明山之大梅為棟梁折為三一沉他山堰下一越上大禹廟一在餘姚之燭溪湖建上玉清洞天道士期相訪玉清僊洞閒鶴飛雙闕下人在五雲間細火薰沉水香風裊博山大丹知有訣九轉始成還昌國道上經行昌國道熟路問漁家山色遥連海潮痕淺没沙畬田香䆉稏野水凈蒹葭馬首斜陽下投林數㸃鴉宮怨無復羊車至空憐鸞鏡悲君恩新寵妬妾貎舊時衰宮樹西風急御溝流水遲起來拾紅葉欲寫恨無詩題寧溪王氏清隱頗愛寧谿上羣峰玉雪明三槐無别隱萬竹有餘清漁父還忘世滄浪可濯纓塵沙方眯目幽事獨關情自東嘉别劉谷瑞照磨偕周縣尉同舟上括蒼訪舊東甌驛維舟傍桞隂孤城當斗口兩塔湧江心奈負參謀醉偶同僊尉吟括蒼何處是西望白雲深送别友人携手河梁上杯行酒莫停雨花天際白岸草渡頭青别意隨流水孤蹤憶泛萍功名須早就休待鬢毛星留别卓習之有客欲登舟將歸南海頭白雲頻入夢黄葉漫縈愁月落鷄聲曉江空鴈影秋題詩聊記别感子意相留次項伯温留别二首蚤年同硯席如子更何人為客江湖久相親風雨頻有懷空著述無問及經綸漢制威儀在中興日月新二十餘年舊重逢屬亂離鶯啼幽谷好花發上林遲君豈依劉表人還說項斯依然京國去獻納正當時贈潜德處士舉世趨榮進君能獨隱潜利名雙轉轂風雨一掀髯書卷酣黄嬭琴床夢黑甜封侯託兵革談笑出閭閻七言律詩敏上人為廣明山叟求詩廣明山叟雪盈顛獨住山中八十年一畝舊宮深竹裏半溪流水落花前每携賔客從詩酒更喜兒孫事簡編杖錫有僧來約我欲修淨社共栽蓮元夕飲客前一日立春雷震于地土牛鞭罷㸔張燈一夜東風轉玉䋲出地雷聲先奮豫發春陽氣喜同升辛盤綵勝宜行酒甲坼勾芒已泮冰漸覺四邊烽火息五雲深處望觚稜甘露寺詩原註逢龍則止落石則歸唐詩開山場禪師公案也改名龍山甘露寺玲瓏樓閣翠成圍落石逢龍事已非江月長隨潮上下林巒時見雨霏微雲厨甘露分僧供茶竈青煙喚鶴歸欲鎮山門無玉帶臨岐惜别解留衣壬寅正旦大雪鼓角旌旗啓禁扉玉堦拜舞引朱衣九天祥瑞呈三白萬國文明御六飛世運中興皇極泰職方重慶版圖歸小臣叨牧居東海逺祝華封達帝畿過上虞西溪湖二首千頃湖田百頃陂波光山色水相依蒼煙釣艇漁歌起野水人家燕子飛培塿蛇蜒青不斷池塘楊桞緑成圍數聲牧笛雙溪外熟路牛羊下夕暉湖田漠漠上虞鄉葑蕩陂塍復舊疆九十九溝春水滿一重一掩岸花香山禽布糓催東作泥馬移秧過别莊慚愧省耕非我地遲歸猶坐野人航過楓亭驛和周草庭廵檢韻就寄餽糧千里又南征笑把弓刀擁將星汗血沙塵前後騎檄書烽火短長亭天連閩海團團白山遶彭湖㸃㸃青遥想環峯三十六將軍晏坐對滄溟挽鐡德剛防禦生來磊落是竒男死後身名無愧慚東海十年憂作疾南柯一枕夢成酣干戈滿眼添惆悵樽俎何人復笑談絮酒漫澆山下土不堪愁思結晴嵐贈刑部尹侍郎自集慶回河南軍上百萬王師屬指揮江南在望隔淮淝斜陽慘淡烏衣巷野水微茫黄鶴磯漫說六朝風雨恨要令萬里版圖歸使君返棹經鄞海閫外還期羽檄飛過靈峯寺曲折青山路幾重又扶短策上靈峯此中元是三摩地亂後新栽四萬松紅樹鳥啼知客到碧潭龍出有雲從老僧求作石橋記指㸃瓶壺說舊蹤梅邊詩意為徐架閣賦坐對寒香獨撚髭乾坤清氣入詩脾沉吟鐡石肝腸語題品氷霜雪月姿東閣水曹春興動西湖處士夜眠遲眼前多少幽情思莫遣城頭畫角吹遊上虞峨眉延壽寺讋服淮夷建節旄肅將王命保東郊軍無餘事尋幽勝客有從遊多舊交竹外雲深僧結榻松隂露下鶴翻巢興闌歸勒湖邊騎一路東風拂桞梢挽江清可州判蚤嵗曾聞辟孝廉春風驥足漫成淹無家可住遭時亂有子能知養日嚴一哭乾坤成倐忽千年泉壤閟幽潛生芻一東來清奠腸斷梅花照海蟾司馬世榮寫神絶憐司馬妙傳神蚤歲聲名動搢紳劒珮英雄趨虎豹衣冠勲業上麒麟杜陵老去丹心苦彭澤歸來白髪新好為衰容圖野服秋風江上理絲綸赴建上武夷清氣接瑤臺想見曾孫宴席開九曲煙霞看未了一舟風雨喜重來滄洲水淨鷗盟逺華表雲深鶴夢回十二仙曹足官府謫居猶得近蓬萊上虞東山寺試上東山望㑹稽旌旗曉拂曙光開東西二眺雲舒卷大小兩江潮去來逺水寒煙曹女廟野花幽草越王臺軍行我欲問籌略太傅風流安在哉謝傅東山幾百年當時高臥豈其然一朝宜為蒼生起正朔猶還典午傳對客圍棊談笑裏敵人退舍計籌先後來指授如公少况復行師有石元寄題雲松齋為潘子京賦江上芙蓉五老青道人結屋倚修屏松隂時作翠蛟舞雲氣忽如蒼狗形萬頃波濤秋浩浩雙飛笙鶴露泠泠採薇童子歸來晚自汲清泉煑茯苓題米元暉青山白雲卷原註世之圖青山白雲者率尚高房山而又多贗本殊不知房山盖學米氏父子慈溪烏性善出此幅示余大不盈尺而有江山無窮意態聚畫史觀之審定為米家物也今房山不可得矣况其師者乎因題近體詩一首以歸之元氣淋漓濕未晞何人胷次奪天機白雲兀突青山起野水㣲茫緑樹肥落筆總誇高彦敬此圖還憶米元暉數椽茅屋如親舍回首家鄉未得歸贈兵部李員外自集慶回河南軍上漢兵蚤已定中華孫述猶鳴井底蛙萬里山川明劒㦸十年草莽厭塵沙鳯凰臺上人回首牛斗星邊客問槎會聽後庭歌一曲秦淮明月動清笳漫興自從流水出桃源便擬辭榮去學仙靖節居官八十日令威化鶴三千年人民城郭還非是親戚琴書莫浪傳青鳥不來花落盡又㸔風雨洗華鉛算尖峯尺五青天千仭尖雲鋪綠髪淨鬖鬖唱籌計是量滄海遺算抛來長翠藍列岫縱横如畫一環峯左右似函三我來欲問數竒耦太極仙翁睡正酣松巖寺為秋月上人賦前湫設險䕶山門石硤中天有線分洞口水簾含蚌淚巖頭肉髻卷螺文玉虹貫夜如秋月蒼狗有時為白雲松下老僧開半榻問余何日解塵氛遊定海縣淨居寺詩龍光蜃氣逼籃輿賔客陪從過淨居縣令相迎秋色裏山僧出定午齋餘新羅杖錫唐時住天竺樓臺宋御書池上白蓮堪把翫何須結社問匡廬遊虎丘寺弔古來登海湧峯吳王霸業有遺踪魚腸劒氣衝牛斗虎穴金精詋祖龍弄影浮圖松竹合㸃頭頑石蘚苔封倦遊欲借前林宿却厭寒山半夜鐘送翁判官進青柑揚州包貢類南琛絳蠟封來色未深先向天邊承雨露肯同霜後出園林雙旌使者獻方物萬壽君王賜德音何事山川苦修阻梯航處處繫人心六月同郡守禱雨育王山靈鰻井為乞天瓢走謁龍秉誠曾到育王宮萬年舍利孤幢在一脉靈泉九井通雲氣合來鰻出水雨聲隨至鳥呼風應須三日甘霖遍太守同歸造物功為前人題漁樵問答圖畫師何意託樵漁山有扶蘓水有魚船尾漫垂公子釣擔頭不掛買臣書一樽酬酢勞相問二老徜徉樂有餘鼔枻爛柯人去後江山風雨獨愁予送童士珍由翁洲書院山長調淛東憲掾考滿昔從鄞海得竒逢弈弈衣冠禮樂雍春滿翁洲生杜若霜飛憲幕採芙蓉盡言東淛觀風好却夢西湖歸興濃别酒一盃歌一曲片㠶江上掛雲峯贈閩憲掾龔漢臣昔年作吏三山上憲府戎藩兩地雄歲月無情催轉轂塵沙滿目數飄蓬君今磊落為清掾我正興居問阿翁烏石山頭霜月白長空萬里送歸鴻送經略掾楊敬修之福建闗西夫子舊儒林萬里俄瞻使節臨世亂謹持三尺法家傳不受四知金鐔津劒化風雲合幕府蓮開雨露深會識草𤣥經尚在後期問字定相尋送經略掾劉彦章之福建宇宙風塵未息戈君才不减漢蕭何大江西去山川改閩海南來瘴癘多荔子枝頭紅錦雨鷓鴣聲裏翠煙蘿吾宗天祿遺光在好爇青藜照太阿三秀齋為寧海葉芝賦原註芝宋丞相西澗公之後從盛熙明讀書鄞海上小僊築館近蓬萊九葉青芝秀色開紫葢霞光浮玉宇金莖露氣濕丹臺讀書還作人間瑞採藥曾從海上囬却愛靈源出西澗至今流水不生苔咏梅朔風一夜向船旗曉起江城望欲迷庾嶺横斜花燦慢羅浮清淺玉琉璃訪尋自可追詩叟吟詠難容譲謝姬借問山中何所有瓊枝瑶草任相携原註是日約友人往山北尋梅為雪所阻因折一枝以寄曹娥廟渡口人家烽火摧渡頭古廟獨崔嵬半溪流水剡中出一帶好山越上來烈女有碑鐫孝行智人啇字較竒才祠前賸有梅花在聊折清香薦露杯中使和卓太御過浙西福建頒賜紫雲衣原註與福建省觀孫左丞同行上尊侑賜紫雲衣中使傳宣出禁扉浙右織坊新製好泉南番舶舊時非三千海水程何逺十萬糧儲貢不違闗陜兩軍休格鬭江淮有客在京畿竹嶼詩何年此地有雲巢水谷篔簹結構牢日莫玲瓏霏霧靄月明蒼翠拂波濤坡陀冷浸琅玕影雨露寒濡鸞鳯毛忽聽洞庭張樂響風煙短髪不禁搔春日即事元元萬彚總胚胎一夜春從天上來海底龍光射牛斗空中蜃氣結樓臺仰瞻箕翼君王壽恢復山河將相材輓漕小臣思報效東風便擬布㠶開題嚴次平畫金陵雪江圖憶昔騎驢過落星西風朔雪滿金陵鵝黄酒熟當罏店淮白魚新水出罾僊佛樓臺銀結構鳯凰城闕翠模稜十年不到塵沙暗展畫題詩感慨増回軍别總兵官書律元非戎馬材笑談偶拂瘴煙開三軍露布勞心盡一夜霜花入鬢來映劒淋漓魑魅血濁醪浮泛髑髏杯便將弓掛山前月笑折梅花領陣囘清華樵隱為丘理問賦海上諸峯翠欲摩清華洞口結盤陀白雲滿地無人掃明月吹笙有鶴過萬丈丹光浮沆瀣一天秋氣濕嵳峩知君高致成樵隱不羡棋仙有爛柯桞南小隱為汪以敬叅謀賦楊桞湖頭手自裁桞南新築小亭臺絶憐張緒風流在擬學陶潜歸去來燕子飛時花雨過鶯聲近處翠簾開塵沙故里休惆悵且放春光入酒盃五月九日過餘姚化安李碧溪宅曉行喜色動林巒五馬聨翩出化安十里青山紆皂葢雙飛白鳥避金丸桑麻問俗科差少樽酒相親禮數寛仙李深根新雨露傳家猶是舊衣冠過鄞城北郭倪仲權居宅城市山林爽氣佳衣冠世裔舊光華花香竹影三間屋道脉書聲十乘家墓草成羣眠野鹿庭柯返哺有慈鴉滿床袍笏承遺澤華萼聨輝蘭茁芽王伯𢎞王郎共我最情親萍梗曾同在七閩壯志已酬青拾芥美髯今見白於銀思君海内多知己習隱山中更幾人却愛子孫兄弟好團欒杯酒歲時新己亥歲旦元氣初囘寳厯新臘殘一日已先春相臣經略江南事民物瞻依天上人草木盡期濡雨露梅花獨不受風塵太平基業當重見萬里丹心繫紫宸上虞蘭芎山葛井葛翁此地煉金丹丹井猶遺紫翠間山勢蜿蜒雙帶舞江流盤曲兩弓彎漁歌樵唱相酬答沙鳥風㠶自往還謝傅獨憐西眺好不來松下一躋攀寄月彦明中丞瓊林燕罷玉堂僊玉閣春風十二年執法一星河漢表靈槎八月斗牛邊手探禹穴圖書府人近蓬萊咫尺天好布九重新雨露盡収江左舊山川見南御史臺中丞月彦明螭頭簮筆領羣才喜見祥烏集鳯臺兄弟貂蟬聨萼棣神仙樓閣出蓬萊星槎逺泛風濤穏霜簡還濡雨露來總愛壺漿迎晝錦家山驛路早梅開挽陳宅之良醫自昔同良相用藥還如善用兵幾見春風躋壽域忽驚昏霧隔蓬瀛幽光秘室金丹在隂德庭階玉樹明聊寄寒梅成薄奠雲深海上欝佳城挽應仁原應郎三釡為親謀蚤歲來從相府遊奉檄未能酬素志獻書直欲取紅頭終軍纔入青油幙上帝俄成白玉樓明月雙溪慈母淚江東雲樹故人愁濮陽吳孟思挽章趙吾篆𨽻丈人行去後專門羡濮陽千古鼎彞存欵識九天星斗煥文章玉樓夢赴緋衣召碧落書成白羽翔有子逺來徵些語誰堪寫勒墓墟旁原註趙謂子昻吾即吾丘子行挽臨海賀叔向三㸃青山小海門風流賀老酒盈樽潮生潮落鷗機靜雲去雲來龍氣昏曾過四明尋舊宅忽驚孤棹返歸魂故家喬木飄零盡尚幸詩書遺子孫送顔寺丞囘京樓船使者持丹詔萬里天垂雨露低海上風恬蛟鰐息江南水靜鷓鴣啼兩年傳舍留旌節幾度連營聽鼓􅎏掛席喜歸雙闕近攄忠敷奏慰羣黎挽徐伯敬原註徐善鐫刻虞伯生作傳危太朴銘其墓南州高士有徐君藝苑才華蚤歲聞天上玉樓誰作記人間鐵筆更同文風林不返悲魂夢雨墨空遺舊䇿勲尚想故人能掛劒裹鷄絮酒奠新墳次楊左丞詩韻二首元戎戰馬來南服自是車書混一家雲合樓船清海岱風生閶闔散煙霞櫂歌激烈悲笳鼓劒血淋漓蝕土花俘馘逺朝天萬里黄金為葢玉為車木陸齊攻黔冦穴山河恢復帝王家三苖將帥扶淵日千里旌旗映海霞楊子江頭風捲絮姑蘇城下浪飛花欲知唇齒相依處掎角先須結輔車餘姚海際阻風飄風舟泊汝仇湖湖上新營立萬夫鷗鷺寒煙生逺水牛羊落日下平蕪邊防要足民兵食賦役兼行庸調租惆悵干戈方四起餘生何地可樵蘇寄張自南尚書江山草莽鬭英雄鋒火相尋萬里同吳楚東南連地坼樓船上下與天通王師大㨗先中夏豎子猶懐建上公寄語乗槎持節使好從淮甸過江東次金防禦越上韻渡江風雨客竒哉越上新詩馬上裁封禪千年秦望在風流一曲鑑湖開嬌施已入吳宮去太史曾探禹穴來更有何人識竒字曹娥古碣鎖莓苔送鍾聲伯赴甬東書院山長宋家天子尊師傅鄭相樓公理學傳湖上青山存禮樂甬東華構祀儒先鄉人早立諸生館博士還無坐客氊今日送君開絳帳杏花春雨聽歌弦慈湖書院山長袁九萬滿任春滿花香竹影間慈湖水長綠潺湲廟廷獨祀揚夫子道學還宗陸象山博士寒無氊坐客諸生業已管窺斑五兒豚犬慙籩豆珍重斯文受代還送杜洲書院山長胡㓜學之任五磊雙峯秀色連新營精舍祀先賢紫陽夫子崇儀像安定聞孫執豆籩泮水菁莪滋化雨芳洲杜若暖生煙童蒙求我須知訓莫為時危廢簡編題靜佳軒浙東旬宣元帥安公節制台郡軍旅多暇志趣幽閒作燕息之所取明道先生詩語榜之曰靜佳葢當亂離之頃四郊多壘鄰境豺狼羣動安公能嚴鎮雅俗坐以制勝無事兵革庸非靜觀自得乎方緩帶輕裘雅歌投壺把酒臨風横槊賦詩茲又佳興之與人同也遂為之賦民物熈熈士卒諧元戎宴坐讀書齋飯疏飲水幽懐靜拄笏看山爽氣佳桞色含煙青繫馬苔痕過雨綠侵堦好因武備修文事還有竒勛勒巨崖此君軒為東湖劉士賦幽軒瀟灑傍湖濵何可一時無此君似有故人蒼玉佩賸看稚子錦衣文凉生枕簟移青瑣影動鸞凰舞瑞雲客至吟詩無别事煑茶燒筍對南薰題松筠軒為上虞嚴恭初賦夏葢風煙神禹蹟柴門舊是子陵家蒼松隔水連筠篠小屋如舟艤釣槎雨過商聲還激烈月明翠影自交加漁樵來往堪招隱業桂小山何足誇寄題上虞陳九成萼軒詩聞說太丘家世好弟兄怡樂奉親闈白雲覆地萱花老愛日當軒華萼輝幾見成行鴻鴈過每懷急難脊鴒飛上堂春酒齊稱壽堦下聨翩戯彩衣天香室為定水寺復上人賦瞿曇丈室小蓬萊誰送清香天上來金粟千鍾如藥擣玉娥一夜竊奩開氷魂乍返蟾光滿露氣初凝鶴夢囘憶得前人詩句好曾揮兩袖歩瑶臺再賦天香室分韻得天字金粟如來骨已仙清香還向月中傳衲僧結構蟾蜍窟藥竈薰蒸腦麝煙斫樹何人持玉斧開奩無語對氷田却收萬斛歸方丈淨洗姮娥色界天題東山寺報上人戒室道人久住東山寺對客還傾北海尊紺室六時修白業青燈一榻坐黄昏隴頭煙雨開窻户門外松筠長子孫共命頻伽何處鳥聽經來自給孤園半山書隱為王熈陽賦數椽茆屋住陂陀上有青山下澗阿花落硯池啼鳥靜苔深磴級少人過讀書曾聼秋聲近拄頰時看雲氣多莫使移文猿鶴怨長攀明月下松蘿明白軒為大璞上人賦教乗宗㫖自天台衲子親承絶學來萬里銀河天似水一輪寳月鏡非臺風飄時節旛應動春到園林花自開大道坦然明白白何須此外惹塵埃平江即事江南景物不勝秋滿目塵沙暗虎丘海賦盡輸龍伯國甕城深鎖闔廬州蒼茫樹色連淮甸隱約金精貫斗牛忽喜天邊新鴈至逺將風露下滄洲題雲間亭為衍慶寺士龍上人賦雲聳竒峯冠海山山僧結屋在雲間松蘿棟宇聊堪賦蜃鱷樓臺不可攀塵慮盡隨蒼狗化納身得侶白鷗閒我來本是無心客拄頰看雲自往還題南薰亭水竹幽亭綠四圍南薰披拂漾晴暉五弦一鼓重華曲萬化同歸阜物機自愛開窻多爽氣不勞揮扇却炎威葛巾野服徜徉處好似雩壇樂詠歸山輝軒為餘姚鄭元秉賦江上峯巒照眼妍開軒况得近龍泉山因石潤清輝發雲壓簷低秀色連砌下芝蘭温似玉春深花木暖生煙廣文舊日讀書地䞉有遺光矚簡編題舜舉獨馬圖錢唐錢舜舉多作花竹卉木菓蔬而馬畫絶罕所見一二耳豈亦如李龍眠善畫馬而黄龍心禪師謂其後當生馬腹中遂不復畫馬而作羅漢人物耶客有持以求筆語者為賦一詩云畫史前生相馬身玉驄獨立最精神沙場百萬空囘首騋牝三千孰等倫金粟龍媒悲草木玉闗驛路暗風塵絶憐一日能千里誰是黄金買骨人感事海上蓬萊隔世塵秦皇漢武竟尋真蟠桃阿母三千歲採藥靈童五百人狠石金銀浮鴈鶩茂陵風雨泣麒麟長生别有軒轅術大地能躋壽域春青山槃野故宋鄭相讀書地也為劉隱君賦鄭公相國舊鳴珂百尺喬松掛薜蘿已占青山為甲第更分緑野考槃阿夜深燈火書聲在秋入郊墟爽氣多重有幽人來結屋門前萬頃白鷗波時事禮樂將興未百年一時民物遽騷然廟堂鼎鼐乖調爕海宇兵戈苦結連冦盜不仁還掠地君臣修德可囘天獨憐邊將相蹂躪縱立竒勲莫自全次東山寺報上人韻僧中獨愛此郎賢方外交從支許傳茆屋新詩還可賦竺乾妙典幾多篇因尋放鶴林和靖却值騎驢孟浩然歲宴江空風雪滿典衣沽酒莫論錢次盛熈明為靈峯寺冩碣韻晉帖唐碑已獨占後來刻畫類無鹽書成碧落人騎鵠墨染烏絲露滴蟾彤管曾題金榜字銀鈎高映玉堂簾解衣盤礴真能事倦後酣餘枕黑甜又次前韻贈熈明紫府丹臺籍已占謫居何事近魚鹽諫迎佛骨韓司馬誤泄天機劉海蟾清夜乘鸞遊月府凉颷剪水作氷簾風塵遍滿人間世却愛希夷睡正甜次龍子高見貽韻二首餘姚城頭啼夜烏餘姚城下水成湖霜落銜蘆初鴈過月明失木窮猿呼干戈滿地憶朋舊道路蒙塵多賊奴邂逅相逢又相别高懷慷慨休嗟吁荒田落日噪飢烏野水清妍似鑑湖媿我握符行有役感君折簡故相呼題詩黄葉烏皮几飼馬青芻白飯奴江海飄零今已久出門風雨又增吁次盛熈明韻自從海上覔神仙却喜山人夙有緣相訪每騎黄犢出忘機曾對白鷗眠世間事與風塵會物外心同松栢堅豈料中秋今夜月靈峯山下共談𤣥送理問知事善積之赴都君家弈世着恩袍幾見蓬瀛掣巨鰲父子相傳衣鉢舊弟兄連占甲科高九重閶闔垂龍衮五色琅玕集鳯毛喜向日邊來謁選笑從海上駕雲濤送曹府知事高本中北上五月樓船海上來高郎元是濟川才蓬萊咫尺神仙近河漢參差星斗開三載䇿勛輸玉粒一朝歩武上金臺沙頭漫唱陽闗曲坐向南薰酒滿罍已亥元夕㑹禮部主事李宗道幾年不作南宮夢今日俄逢禮部郎天上謫仙來太白山隂道士愧知章良宵藜杖然金炬明月梅花對玉堂一葉扁舟能共載又吹鐵笛過滄浪送中書都事張道亨囘京翩翩天上張公子奉使曾乘八月槎海外何人傳羽檄江南有客寄梅花孤舟詩卷輕行李萬里鄉闗慘莫笳北斗蒼蒼雙闕下為君囘首望京華送楊敬脩入京楊郎丰骨與人殊落落才華美丈夫清廟閟宮瑚璉器碧梧翠竹鳯凰雛干戈未定人千里風雨長吟宅一區穏汛靈槎須犯斗莫教滄海有遺珠送中政院同僉鈒納鳴謙囘京禮樂湮微復中興漢官還覩舊儀型一枝桂折蟾宮月萬里槎浮使者星海上樓船吳粲白尊前風雨越山青九重若問江南事為說干戈尚未寧餞刑部牛繼志郎中囘京中郎持節下南州萬里江山道路脩昔日名魁龍虎榜幾年春滿鳯麟洲已知攬轡清河洛不用乗槎犯斗牛歸覲天顔承顧問好簮玉筆侍螭頭餞兵部脫仲實郎中囘京中郎奉使出安邊萬里春風快著鞭道上驛程連斥堠海頭蜃氣壓樓船雲霄雨露低雙闕草木烽煙已十年歸歩玉階須獻納江南早晚息戈鋋四明應節婦張氏詩次馬編修韻血淚痕深墓柏枯門前華表植雙扶孤飛黄鵠還將子六袠蒼顔尚奉姑亂世死生同草木起家貞節自閻閭華周有婦能移俗千載猶聞善哭夫樂節婦原註夫樂壽孫鄞之定海人因與鄉人聚觀驅儺渡江溺死者十數輩皆不得屍婦抱乳子沿流號泣數日欲與子俱沉俄而夫屍獨浮出遂歸斂葬婦年二十七事舅姑撫孤子紡績自給誓死不他今年五十矣有司請其事危太史為之傳旌其門閭焉哭夫鄞婦類曹娥江水江花血淚多乳子未堪霜露託鄉人為輟歲時儺寒雲重覆湘妃竹白鳥孤飛滄海波太史能修貞節傳門前華表勒詩歌海上寄金防禦星馳羽檄下天台又督舟師海上來虎豹旌旂拂河漢鯨鯢樓觀接蓬萊一聲鐵笛雲雷動萬葉蒲㠶風雨開囘首故人雙闕下招邀明月坐瓊臺登樓危樓百尺搆慿虗中有幽人讀古書攬結多應山水秀棲遲得似神仙居湖光展鏡涵青瑣雲氣如虹繞玉除好倚闌干招李白九江何處是匡廬巢雲詩安定道人無屋住山中結構雲為巢市朝一片塵氛隔世事幾番風雨交丹氣化為蒼狗去𤣥闗時有野人敲我來無覔深幽處但見長松舞翠蛟丙申歲九月晦日自錢塘江放舟至廟山值風閣淺且遇冦幾不免夜忽夢金甲神曰吾岱山之陳侯也來迎護爾須臾獲濟後舟至岱山果有陳将軍廟甚偉式符夢遂以牲醴祀之江迴沙淺海舟膠胥浪掀騰風怒號星斗光沉和月黑蛟龍氣吐值秋高赭山在望難囘棹黄帽相逢出佩刀恍忽惠徼神力祐試來古廟奠牲醪為紹興錄事高文起題鏡湖秋色圖參軍曾住蓬萊都厭見黄塵日走趨遮道少年騎竹馬棄官何處無蓴鱸青鞋布襪若耶路紅蓼白蘋賀監湖滿載酒船秋色裏風流一曲剡川圖陪丞相宴西湖南北兩峯青未了西湖一曲奈愁何玲瓏宮殿嘶戎馬寂寞樓船掩翠娥紅錦水雲秋色老緑漪風露晚凉多叨陪相府開恩宴喜報淮夷已倒戈西湖行春絲絲楊桞映蘓堤沙軟風和快馬蹄千里湖光春雨過兩峯塔影夕陽低落花芳草西山路怪石眠松後澗溪月下歸來人半醉滿城燈火閙香泥湖上書所見沽酒樓前喚客遊朱簾半捲雨初収六橋春色花如畫十里湖光翠欲流騕褭驕嘶楊桞岸玲瓏欹舞木蘭舟誰家兒女多恩怨欲化紅蓮結並頭
