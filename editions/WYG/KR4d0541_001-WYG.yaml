body:
  text: 羽庭集卷一元劉仁本撰四言詩五雲為括蒼王叔雨賦也叔雨擬托於雲避地上虞之五郛作雲溪雲堵雲居雲松雲路以自娯為之賦焉白雲繄繄于彼澗溪載興載揚為虹為霓為膏為液有渰萋萋樂只君子迹其天倪白雲湑湑于彼洲渚其流如脂其湛如水或霈而泄或窪而澍樂只君子思其霖雨白雲徐徐鬱彼蓬居以攬以結以卷以舒孰為之搆自我庭除君子戾止其樂只且白雲溶溶施於長松長松千尺矯如蒼龍白鳥鶴鶴載蜚載翀君子戾止灑然清風白雲楚楚覆于行路如軒如坻如迎如遡迺息迺怡靡或馳騖君子戾止其美無度五雲五章章八句五雲美韓也韓祖魏國忠獻王登宋天聖第唱名時太史奏日下五色雲現葢令德之符也既南渡後嗣孫徙居越上五雲里者祕閣左司公有作五雲次舊聞詢齋先生有五雲續舊聞莊節先生有五雲漫藁十世孫諤力學制行扁其藏書之室曰五雲書而其號五色生昭不忘其祖也前翰林侍講金華黄公溍傳其事嗚呼豈五雲之瑞與韓氏相為終始歟故作詩美之猗歟卿雲五色氤氲兆為禎祥天作人文頎頎魏國令譽令聞既魁多士克相大君以踐台鼎以樹元勲雲施為澤澤垂後昆世祈南遷自相徂越五色宅里相攸奕葉如雲斯興奮乎莫遏如火既然如泉既達禮樂冠裳光華炳越宜其子孫克篤前烈卿雲五色于日之下作其休徵以篤韓祜頎頎魏國在帝之所出將入相文武吉甫有子有孫繩其祖武諤也雲仍其儀楚楚庶幾詩書以永韓祚五雲三章二章章十二句一章章十四句俞節婦原註猗嗟孝節也勾稽俞婦聞氏女勵節克孝人皆賢之故作是詩也猗嗟賢女來嬪于俞克遵婦道重罹厥辜既䘮爾男復殞爾夫乳子在哺孰相爾孤􅑱􅑱以樹堅志弗渝績紡自給養終而姑猗嗟賢女歸為俞婦既失所天伶仃孤苦刻志養姑弗堪其窶父母欲奪誓則弗許引刀截髮號泣以詛天地鬼神胡寧弗顧猗嗟賢婦節孝獨貞姑嬰末疾復翳于盲吮瞳䑛睫視為之明既其令終䘮弗克塋褰裳傴僂負土以營悲號哀籲風雨晦㝠猗嗟賢婦克殫節孝懿德令儀是則是效昊天孔昭爰食其報宜其子孫宜其壽考鬱鬱勾稽雙桓具表我歌匪溢式勵風教猗嗟四章章十二句湖田閔上虞也田利於湖水而或奪於豪石民甚病焉故作詩以閔之也漠漠湖田瀕于海堧為畎為畝湖水漣漣以溉以灌稼穡闐闐弗溺于澇弗暵于乾湖水綿綿歲取百千藝我沃壤粒爾艱鮮誰其作者手足胝胼致力溝洫禹無間然維田於於受水於湖計水之利亦入其租其租伊何受田之家既利其利迺輸其估官弗民病多黍多稌湖水鋪鋪或堙或蕪弗治弗疏深溝為塗弗剪弗鉏有荷與蒲彼豪者徒罔利以圖謂湖可畬官輸是誣迺泄其瀦以藝其淤朘我膏腴以害我農夫衆迺咈怒彼有餘辜我疆我場我田我穡繄湖之水實利之食樂歲狼戾伊帝之力蒼蒼者天去此蝥􅉶俾浸常滛彼敓田殖深我溝洫滋我黍稷豈弟君子俾民弗慝後來其詢視于版籍湖田五章二章章八句一章十句石他山之石既堅以貞既攻既錯于以成城迺疆迺理經始營營萬夫皆作百堵崒興以築以登弗怠于程謂城葢高如陵如臯莫堅匪石莫深匪壕集我畚杵聽我伐鼛民亦來只不敢以告勞昔我先王有馮有翼作我藩垣保我疆埸後來弗修恃險蔑德城非不高孰為堅壁維城連連維守迺堅守或匪良式戾于愆或據以叛或擅而專或降于敵或棄以捐化為豺狼風雨變遷民維邦本先哲有言維此屏翰惠我黎元宗子維藩大夫維垣式遏亂虐以克完完他山之石永矢弗諼石五章一章十句二章章八句二章章十句題水木軒維木有本維水有源水木假義以名我軒源清莫激本秀莫繁激則潛逸繁則集喧止淵茂植取逢其源南山心逺欲語忘言五言古詩寄許具瞻省郎長松出古澗參天二千尺矯矯冰雪姿不為歲寒易女蘿附其顛亦復借顔色一朝事斧斤剪伐由中直但願成棟梁女蘿不足惜臘底雪歲未盡三日雪深二尺餘喜作明年瑞先占大有書去年冬不雪今歲田無儲十室九懸罄空山拾橡柤橡柤饑可療拾盡將何如所愁凍餓死不見明年糈為朱伯言題卷朝陽有異士曽造重華庭一鼔南風曲萬物為和平東姬及漢晉秦楚無餘聲彼或怨以怒又或淫而傾素絃不為理千載懷幽貞美哉昌黎伯掇拾風雅英欣然作十操擬託周孔名辭情或㣲隱古意誰能徵抱琴適東海迺遇鄒陽生廣操一紬繹援琴為我聽三嘆有遺音始足擴其情天地既寥廓日月行清明夜忽夢聖哲吾衰感精靈起謝抱琴士伐木何丁丁長揖出門去幽思秋㝠㝠次帥掾張惟彬見寄韻吾友張公子形骸頗疎放長才鬱未展浩氣自清尚豈無萬里心為謀三釡餉王良善徒御乃使驊騮踼猶能範馳驅未信斯文䘮念昔與子遊中心日傾向如何乆參商杳爾音書曠懷人天一方氣與孤雲盎明年上玉階子當擁仙仗儻能貽好音庶慰吾心壯賀金元素拜福建省㕘政仍兼海道防禦𤣥靈忽中激四起波瀾狂河源溢故道淮泗迺濫觴大江㳂西下瀰漫汎沅湘浙水注東溟安流稍不揚蒼生思濟涉孰作巨川航金君將相材起身自文章時危多武備帝命出禦防三年持節鉞四境民樂康囘瀾矻矻石心赤葵傾陽豚魚既孚信豺鱷俱遁藏喜今膺大拜擢置居巖廊匪惟天意眷允愜民心望旌旗障海上照耀閩南荒大厦圮將構瓌材須棟梁車攻能復古東姬期載昌向來弭節地暉曯有餘光次楊彦成見寄韻東方有處女皎若冰霜潔十年無可人布衾冷於鐵萬里君王心所思漢宮闕及今寡所諧猶自重名節肯逐兒女妍幽閨夐清絶寧死不苟從從人有真訣君家好弟昆磊落皆英傑蹇修莫致辭令人生肉熱三歎理瑶琴寄調相思闋上有青山髙下有孤鸞别餞秘書卿貢玩齋于慈溪永樂寺分韻得壑字牽舟泊洄渚飛觴坐林薄惜别起遐思凉飇散寥廓宦鞅昔言邁朋簮乆離索及兹税塵驂清華登秘閣雲漢倬昭囘奎躔仰盤礴搔首發孤唱商聲激巖壑適意為倪仲權作我有琴一張我有酒一壷我有書一卷我有宅一區物我兩相㤀天地一籧篨吟咏乎情性緩歩而舒徐今人不我薄合與古人居登山時採茹臨淵或羡魚人生適意耳須富貴何如雜花林紫薇坡葢靈源山十一詠之二也為住山阜上人賦靈源函丈地種種植羣葩燦若列瓊瑶明如鍊丹砂繽紛衆仙袂絢爛五色霞粉白與黛綠一一含春華為言觀樹叟且復觀其花恍然色界天風雨成婆娑贈章履祥入憲幕幽蘭在空谷泉石生輝光春風茁其穎曉露滋其芳脩名不自眩信美誰能忘移之古柏下足以怡風霜願持君子操永佩騷人章囘頭視衆草紛紛道路傍七夕宴會分韻得人字雙星會七夕芳筵瓜菓陳長歌乞巧辭對酒娯嘉賓牛箱既不服空飲河畔津女織不可被支機乆沉淪徒以智巧名役此愚拙人紛紛兒女輩詐偽日以臻寧知有大巧淳樸還其真雙星竟無答我亦不汝嗔但見銀河翻風雨横秋旻查查兩靈鵲屋角時來馴次韻奉答柳洲陸德陽柳洲有佳士襟度殊清豁文采鸞鵠俱履操冰霜若芝蘭暎玉樹封胡與羯末才名人共誇道義羣蒙覺時世遭亂離行藏始蕭索坐歎扶摇鵬遂困蓬蒿雀海濱忽解后羇懷慰寥寞伊昔薦南宮起身事文學王迹詩未亡春秋謹書法禮樂字縱横珠玉炫參錯波瀾振頽靡錭鐫敦菲薄閶闔風雲會璇璣星斗泊披腹呈琅玕傾心秉葵藿孰謂河漢表支機不可著五色雲錦章迴飇竟飄落歸來坐黌宮教育資三樂文運夙艱危武流競聞達健翮尚㝠飛靈姿終聳壑未起東山臥且赴西湖約楊柳曉風清蒲萄春水潑共君解塵纓長歌醉濯髮題毛貞士傳蒼蒼松柏操不為霜雪移矯矯君子行堅貞常自持功名及富貴顛沛與流離小人患得失君子審處之美哉毛士子淑慎爾威儀彬彬周太史傳實無靡辭願保歲寒節允懷風雨思清飇激頽波永為衰世貽贈四明胡古淵胡生安定系胷中星斗羅手持一寸鐵琱琢千岷峨漢經與秦繹草𨽻及篆蝌班班善模勒歴歴能爬挲風雲抉河漢海岳騰蛟鼉九霄鸞鳳翥圭璧明瑳瑳六書盡標本八法無舛訛往年在天府巍石蒼穹摩臣模播聖德刻畫功居多今年歸海上四起紛干戈方叔一戾止跕跕安鯨波弓刀錫辭誓帶礪同山河文儒載巨筆老稚齊謳歌崢嶸事鐫鏤千載功不劘淋漓傳墨本觀者填丘阿作詩美斯善愧爾黄庭鵝明年中興頌㣲子其奈何寄卓習之教授天台接四明雪竇連丹丘神仙所窟宅雲樹相綢繆上有兩白鶴千年結清幽不為鳳凰似不與凡鳥儔天風忽引去一息三千狄雙雙整羽翮齊落南海頭兩鶴自鼔舞朝夕鳴相酬一啄丹山頂一飲劒水流丹山彫瓊樹劒水凝不收遥遥山水間燦爛雲霞浮兩鶴又相顧誓言毋乆留巢穴本同地出處良亦侔寧不返華表誰能上揚州遊餘姚靈源山明真寺詩原註寺乃晉支遁講道之所時主席昱大明宋劉忠諫公四世孫也忠諫與吾生祖郭正肅公同在言路論事為權臣所害故詩語及之時遊謝安寺今來支遁家昔賢冠葢地我亦隨行衙旌旗照山谷甲帳浮煙霞峯巒濯秋水􅂱􅂱青蓮花燒香開寶殿老衲持袈裟昔逢暑雨足百卉生狄華平川沃禾稻原隰收桑麻雖當軍旅際民物安生涯甚愧二千石田里無愁嗟夜凉開講席竒芬發天葩語及通家好前修倚莩葭羣書在西閣萬竹森交加白雲繞牀下明月來簷牙忘言煮春茗清思散幽遐安得洗兵甲共泛靈源槎西樓喜雨并序癸卯夏四月不雨實切雲霓之望遂有事於山川五月三日始雨四日五日又雨於是領客會於西樓飲酒賦詩志喜也會者凡八人咸謂屬兹艱危在逆旅中硯田筆耕亦不能無望於穫焉於時雲氣敷落雨聲連續竹檜森爽凉浮几席間似有秋意衆賓懌然相與為樂歸功太空欲即坡仙名亭之意以名樓席長陸君德陽謂余亦郡守也遂摘取韋蘓州詩八句分為起語人各足成篇篇十二句復俾余序之詩如左姓名附見余得起句俯飲一杯酒俯飲一杯酒仰酧三日霖兹辰屬端陽候律生初陰枯槁沐甘澍一滴當千金禾苗遂長薿卉木良蕭森匪暢西樓樂實慰南畞心懷哉答靈貺永言託㣲吟題昱大明住持明真寺行卷後爾祖與我祖同居宋臺端清名照冰雪蒼天日月寒兒孫百載後名保青氊完師今在林下我立當驚湍師能振宗鐸我徒懷悲酸邂逅一相遇握手平生歡青燈讀家傳山殽飣盂盤相期共努力先德殊未殫送别友人送客長松下松間一壷酒酒盡客當去踟蹰重擕手念我平生歡感我離索乆豈無絃歌娯歲宴寡親友情深語反短契合誼益厚居人戀舊鄉行子在逺道灼灼洛陽花依依漢南柳昨日少年客今朝成老醜一心秉明德離别何足取過餘姚州謁嚴子陵故宅高節書院昔年過桐江釣臺鬱千尺扁舟泊祠下高風不可涉歲月忽飄零惆悵塵沙隔今來舜江上先生有遺宅林巒見儀形草木含幽寂南山崒嵂高氣與秋旻逼尚有古風煙睢盱漢物色雙桓高節表千古頽波激仰視客星堂穹碑頌遺德懷賢拜衣冠愧我持鋒鏑落日照巖扉凉飇洒芳席蟬聲散餘清孤雲斂㣲迹天象詎可窺乾坤𣺌猶窄長歌雲山詩目送㝠㝠翼和高灞雪經歴致仕韻宛駒縱逸步豈為千里窮長鳴一振鬛閶闔生華風燦燦黄金絡矯矯玉蒼龍乘駕穆天子周遊四海空瑶池上仙去寧知八駿功爾亦謝芻收飄飄載喬松房垣我窟宅倐忽騰雲中送内弟王仲祥掾史赴福建省凉飇薄天際秋聲動羣蟄載酒出城來為子澆鬱悒子著從事衫浩氣風雲集左手掛弧矢右手持决拾有懷離别情肯為兒女泣駿骨服鹽車安能乆羈馽萬里閩南路天昏瘴烟濕我昔佐使者分曹行郡邑後來在藩閫軍民乆寧輯念此遭亂離吁嗟亦何及儻見黌宮叟為我致長揖遺我珠玉篇珍藏猶什襲明月下閩關願逐清光入舟泊石門洞孤舟一夜雨溪流漲三尺起來推短蓬洒然好山色旭日弄晴暉微雲斂殘迹修睂澹欲舒嬌鬟淨如拭巖華亞髙低幽禽互喧寂仙人石門洞捫蘿可緣陟蒼松雜疎篁清泉潄白石野鶴從何來長鳴韻嘹嚦是時秋氣中天宇湛虚碧吾徒詩眼明從者行亦適凉月忽在林客衣風露襲篙人苦相催前灘起鸂鶒題東坡居士著屐圖楚楚玉堂仙飄飄儋耳客羈孤萬里身誰當慰岑寂黎家釀新篘相邀風雨夕麻條束緼袍竹笠行山屐歸來載酒堂泥深步傾仄陶然天地間乃知謫非謫千載慕風流落月見顔色徘徊仰斗牛高標不可陟建寧芝山取陸羽泉煎茶次卓習之教授韻建城南五里芝峯特清麗頗聞此山中有泉出雲際昔逢老茶仙烹嘗殊品第寥寥百載下幽尋竟誰繼客從三山來顧兹若神契清風忽我招脱巾坐林翳金芽芝髓滑石鼎松風細一飲詩脾清再啜凡骨蛻清談各盡歡悠悠成乆憩何當起羽仙飄飄逺塵世憶别二首君行湘水頭妾在呉江尾君妾兩相望遥遥數千里音書似投石歲月如流矢念妾初事君終身托生死豈期負年少春風誤桃李逺浦雙鴛鴦齊飛墮秋水牆中牆外花何日復連理抱琴不成彈掩面淚如雨妾在呉江尾君行湘水頭君恩與妾意共此江水流别時花未開落葉忽已狄狄風苦裂帛道路無重裘孤燈與明月照影不照愁有書不堪寄那知沉與浮塵埃生鐵鏡衣帶寛呉鈎努力君加飯妾身夫何憂紫薇坡我時居掖垣堂署多紫薇夜直坐花下明月涵清輝一為風塵起遂與花相違鐵衣過林樾霞佩在巖扉相逢喜得得欲語情依依花能擇幽地我乃乘危機愧花作招隱行當歌式㣲自東嘉與周草庭縣尉同舟至括蒼詩以送之拏舟上括蒼同載得良友秋日淨宇宙凉飇在林藪地勢行漸高溪流緣下走潭影日月寒灘聲風雨驟篙師拽短纜傴僂狀如狗險惡勿相角前呵後揮手來舟欲挽前去者那肯後復有叩舷人得魚時貫柳青山為主賓掛石還沽酒白鶴下青田啄以芝千畞仙班儻可尋宦路亦何有君今去作尉小邑僅如斗况乃山水佳武夷在其右梅福有古祠丹臺遺藥臼須君一問訊肯寄刀圭否石門飛瀑次鮮于伯機都事韻巋然兩石峽連雲不能斷飛瀑忽中分千古作竒觀玉龍蛻鬐鬛灝氣薄銀漢銀漢爛不收萬斛跳珠亂天宇肅高寒候律踰秋半維舟石門下遂得飽清翫山中有高人為我理焦㸑焚香謝塵俗横經列童冠山猿與野鶴可聞不可喚平居懷謝樂我亦思張翰六月四日宴倪仲權荷亭凉颸起蘋末疎雨滋水花彤雲擁翠幰來駐山人家山人領賓飲碧筒吸流霞清波蘸方席小屋如仙槎浮光濕衣袂餘馨散幽遐鳴蜩咽古木竹影森交加坐乆良不厭樂意殊無涯因思越城下擾擾飛塵沙戍婦吟四首明月何皎皎白露湛為霜妾身未有託遊子天一方悲風四邊來中夜起彷徨欲隨明月去懷哉不下堂妾在父母家衣容常楚楚一朝無良媒嫁作征人婦征人逺戍邊勤勞日夜苦欲往復躊蹰有言不出户夫君在邊戍妾身守孤幃欲往備紉櫛不如頻寄衣衣到恐遲遲不到妾不知欲知衣到無明年鴻鴈歸將軍功未成持牛勞軍士將軍豈無家為妾語夫主勿為賤妾生寧為將軍死賤妾欲從之軍中無女子七言古詩董君諺軍功詩龍媒神物筋權竒落落不受黄金羈伯樂一顧價萬倍乘雲獵霧從驅馳董生逸氣有如此管侯何術能豢之千金購士未為寶人生莫樂新相知至元五禩秋八月炎荒夜半盲風吹蠢爾無知梗治化結巢據穴何險􅥤守臣邊吏不敢視貔貅百萬勞王師瘴癘潛消軍卒勇矢石空遺寒暑移管侯忠貞昭白日金符玉節光陸離一鼓作氣萬夫勇三軍制命傳節麾帳下豈無謀策士董生指畫如摘髭凱歌捷奏獻俘馘膏澤大洗民瘡痍柳營之江春水瀰礬石之陽瘦石隳我聞昌黎作司馬隴西用爾平淮夷儒者胷中有兵甲奮忠肯為兒女癡董生日夜讀古書小試寧無大設施浩歌長嘯風雨作劒氣直上星斗垂丈夫會遇各有時為君歌此從軍詩謁建上梨山廟建安山水東南竒扶輿磅礴來武夷巨靈掣此崐崘秘煙霞翠碧長淋漓夫何蜿蜒吐金景孤峯特立無與並千崕萬壑爭獻技盡向梨山作藩屏梨山有廟廟有神迺是皇唐之藎臣英英國姓通帝籍字曰德新名曰頻當時受命拜天子來向建州作刺史建州逺在天南荒百萬蒼生寄生死刺史下車觀民風刺史下令則民從道路謳歌閩越最詩書禮樂鄒魯同唐德距今幾百載德在民心有遺愛生為邦侯死廟食水旱不逢無札厲年深歲乆事糢糊祠人罔或識厥初强名爾囘字爾度嗟神之靈詎可誣只今王封又三禩新作王宮五雲起氣燄掀騰上牛斗溪山秀麗撼風雨邦人鼓舞歌太平石班鮓香來薦誠劔㦸森嚴擁遺像音容響荅如平生我亦瓣香謁靈祇對越英姿凜顔色摩挲兩眼看蒼石但覺閃閃神光擲我聞古有烈丈夫磨牙决齒面裂膚忠肝義胆相照燭光岳英靈何代無區區作吏謝神寵百福是遒祿是總稽首再拜心為悚梨岳之峰欲飛動題鄂省知郎中母太夫人劉氏節行詩卷女蘿託質青松樹半夜髯龍忽飛去庭闈霜月生高寒碧蔓縈愁幾朝暮仙家種出忘憂華合有春工新雨露幕中狄香渚蓮開山中黄鵠銜書來見說門楣表貞節白雲遮斷江聲哀為黄理問賦百牛圖谷口山村百牛犢牧子羣來四十六蒼茫牝牡各意態頭角崢嶸立如簇或行或齕或寢訛落日川原豐草綠一羣逺自村南來一羣相隨過江北兩羣分隊復東西角力參差忽成觸持鞭左右猛欲笞欲笞不笞互毆遂前呼後噍亂不羣散漫陂陀走林麓老翁秉耒歸西疇畊遍一犂春雨足啄瘡鴝鵒背上行四五飢烏下枯木爾牛一一耳俱濕爾牧徜徉樂蕃畜不作南山白石歌雨笠烟蓑自櫛沐席也或茵坐鬭草捲桐為角横吹竹輕竿小網出蹄涔亂拾薪蒸在腰束榮名利祿了無關差科不競歲年熟何人筆力囘萬牛斑特烏犍動盈幅憶昔龍眠善畫馬人言後當生馬腹我今覩此考牧圖嵩骨已朽誰能贖邇來草木暗風塵坐歎十牛紛九牧四郊搏囓豺虎多蕃庶一時成觳觫赤地千里無菑畬觔革歸官喂飢肉安得問津河畔人織女支機同杼軸復見周宣九十犉昇平大放桃林牿先生玩圖萬山底便好歸畊坐茅屋曉日神光射牛背遮莫辛勤掛書讀贈瞽僧通月海天上有眼秋月明下照海水神光清海水明月萬古情盡使品類涵羣形天台絶頂有老僧曾泄天機天所憎天令怪物蝕其精老僧迺以月海名古來瞽矇心則靈師曠有耳通五聲人生三十骨骼成舉手一觸分枯榮禍福歴歴皆可慿高談霏屑鬼神驚昨夜策杖來叩扄為言我骨多峻稜我言師語他日譍請師持此來余徵上虞大禹峯夏葢湖山寺分韻得楚字我倐秉飇帝之所謫向滄洲采芳杜水田萬頃夏葢峯茫茫禹迹靈鼇負金仙赤脚開寶坊倒影玻瓈濕窗户玉壺下浸馮夷宮瑶光上掣璇璣府闌干十二銀闕通日月煙霞互吞吐瓊枝棋樹凋秋霜赤壁丹崖墮𤣥圃夜半潮聲風雨來老蟾捧腹魚龍舞我時一葉青蓮舟雲從羣仙盡翹楚紅塵隔斷人間世手挹天杓酌清酤醉登絶頂呌虞舜神禹之功垂萬古野渡舟横青洲渡頭舟自横浪花帶雨春潮生竟日潮生復潮落沒泥青草無人行向來此路當通道行人喚渡爭先到只今鯨鯢浪拍天無復行人有飛鳥送委羽道士北遊奉林昔沼空明山靈光夜夜飛寶丹丹成白日上天去時聞笙鶴來人間師今别我竟何往真仙窟宅窮躋攀東掠扶桑繫海水西登崑崙欵天關玉泉儻許借辭色為言鬼蜮尤肆姦上界仙曹足官府胡我所治多荆菅願得劒光斗牛下一洗東南民物艱政恐依然隔風雨碧桃千樹春闌珊送阮止善提㸃福州紫極宮我昔騎鯨度南海直上三山躡煙藹珠宮貝闕開參差玉荔瓊枝動光彩紫極真人坐瑶壇𤣥精百鍊成寶丹帝勅天丁為呵䕶金輪黑幟猛虎跧鬼蜮潛形不敢奸瀛波跕跕無狂瀾真人去後遺劒冠石壁丹臺風露寒君今談𤣥得真訣麾叱雷霆下金闕三神之君持絳節乆待滄洲弄明月桂山見月青洲桂樹何團團樹頭明月不可攀嫦娥揭弄山河影乞與人間之廣寒白兔細擣長生藥香飛屑屑金華落主人折桂月中歸月中桂子誰能斫梅澗寒冰青州古澗凝寒冰上有老樹盤稜層玉壺明月印疎影乃知梅與冰爭清逈然孤標出萬壑凌室寒光照東閣欲擕紙帳澗底眠餐水啖梅兩不惡隔林僧梵青洲洲外梵王宮映牕海日摇青紅門前潮汐自來往隔林煙靄聞疎鐘鐘聲喚起漁人夢海上風塵方澒洞輸與山僧入定還龍女時來獻清供次韻琴鶴歎練朱疏越忘遺音雎鳩鳴鳳成陸沉離鸞别鵠聲哇􅁋雜嘈非瑟還非琴牧犢感此朝飛禽何人賈衒白首吟漢宮女子恩怨深悲來乃售詞客金蘋蘩王化行周南變風一作傷人心懷哉令威遼海東一去不返城郭空朝陽五彩遺孤桐雲天邈邈飛㝠鴻陽侯吐氣乘毒龍旄頭吮血流為虹華亭煙雨悲秋蓬凄然嘹唳將安從飲啄不下空明宮羽衣何日能相逢少年行城中美少年十萬當腰纒朝擁紅姬醉莫入花市眠青春事游俠白日行神仙豪奢侈靡競誇詫干金之裘五花馬明珠的礫珊瑚赭錦囊翠被薰蘭麝生來富貴無與倫豈知耕稼識艱辛一朝世變起風塵少年嬌脆無容身城外惡少年膂力如虎健令人出胯下麤豪逞精悍舞刀持槍乘世亂掉臂横行遮里閈剽掠人貲為巳劵昔無擔石今百萬結黨樹羣肆欺誕矙室慿陵何所憚一朝黄霧肅清飈大官正法施王條隳突追呼行呌囂少年浪跡無遁逃鉗鎚束縳首為梟鞭流腥血尸市朝我作歌歌年少毋為美誇毋惡暴我作歌歌少年夜讀古書朝力田作善降祥天則然生當亂世終得全四明車廐驛世傳為秦皇求仙廵遊駐蹕之所秦皇詐術愚天下好誕反為人所愚萬乗既尊天子位九重即是神仙居茫茫采藥馳男女厯厯祈神封禪書海上蓬萊果何處山河囘首成丘墟後來漢家第五葉露盤通天亦可吁祈天永命别有道長年當效唐與虞竹塢清風青洲種竹千萬竿翠葆常生六月寒日色㣲籠金影碎風聲戛戛青琅玕疎為三逕密為塢此君何用侯萬户可是故人期不來我獨悠然造竹所登福州鼔山屴崱寺詩原註寺在河口又名涌泉上有七曲亭晦庵先生舊讀書地也屴崱屴崱萬山頂佛窟深藏白雲靜天台有客愛看山摩挲蒼翠踏雲影一曲初上乘雲亭乘雲便覺毛骨輕山花迎客山禽語同行亦有三兩僧二曲孤亭半山立獨松偃蹇蒼龍蟄亭前石塔古佛刻巖花􅆴􅆴苔蘚碧坡陀三曲勢欲平慿欄一望心眼明長江暎帶出其左孤巒湧躍如渴鯨峯囘四曲勢危陡下瞰城闤僅如斗風帆沙鳥江上來盤屈長蛇又其右有亭五曲如騎龍翼然兩角爭為雄孤高峭立衆山上金榜重標第一峯六曲七曲天咫尺石門參井皆可立崇墉繚繞入深閴重𤣥寶閣揭飛錫中峯後擁如天幢左之右之萬陣降浮圖百尺扶漢起玲瓏八面鳳鳴缸老僧一一為余語香霏翠蕩天花雨靈源洞口雲氣深欲聞石鼓呼山鬼山鬼不應鼓不鳴寒崖空寫喝泉名當年一喝有何異至今不聽潺湲聲雨亭坐對忘歸石石屋臨滄接東極天風海濤孰揮灑迺是紫陽真人之遺蹟我今乘興來登臨尋幽索怪成孤吟却憶十年夢中到一聲長嘯開煩襟興闌步月出前林囘首白雲深復深將南歸桃花流水碧潺潺劉郎誤入天台山玉簫吹斷丹霞夢囘首塵霧非人間乘鸞却向武夷頂手攀明月弄清影何人苦斫丹桂花萬丈金光落銀井劃然長嘯天地秋天風吹送三神丘真仙笑贈芙蓉玦白日翺翔南海頭海若揚塵海水立焦熬斥鹵青煙濕蒼生願得秋雨凉却嫌珠碎蛟人泣飄然拂劒來東呉葛洪鼎溢流成湖翩翩紫鳳在何許空山凡卉皆焦枯滿目黄埃不可住翻身又入三山去荔子丹燒火齊紅瓊田萬頃芝堪茹絳衣仙子彈金徽把翫琪花待我歸珠宮貝闕芳菲菲胡不返兮將疇依裁雲為佩風為騑吾將去矣聊以明吾幾題會溪圖贈胡仲玉四明山高水發源七十二曲流奉川幽人結屋會溪上千巖萬壑多風煙派分自是安定系薄宦因家二百年子孫讀書尚文彩鐵筆代畊無石田去年海上逢古囦天府璠璵多鏤鐫今年相見有仲玉叔侄古意俱蒼然青燈夜雨看石刻姓名世上同流傳只今戍壘填郊原文章圖史誰復言落日放船會溪上山水窈深聊考槃武戡文定垂不刋行當與君撫巑岏白雲篇七首芙蓉花開隔秋渚白雲孤飛度江水江水長帯落花香我心逐逐雲飛揚山中白雲不出山山外白雲招不還雲亦何心異出處我獨傷悲淚如雨鷄聲喔喔號風雨布衾寒氊冷如水我興不昩聽鷄聲鷄聲漸歇風雨晴樓頭鴈過殘月明曉鶯飛上春風枝學語未成兩小雛我思歸兮夢千里隔窗何人弄機杼空明山色浮丹丘美人結桂山之幽簸弄煙霞鍊方石我欲從之歸未得長憶明空好山色光風和月蘭生芽茁茁擬作明年花花有清香三萬斛我有寸心耿幽獨相思欲奏猗蘭曲彼美人兮在空谷曛曛曉日山色蒼起來覔鏡如明霜有懷不語對鸚鵡君不來兮君馬黄琵琶曲冰絲雪練紫檀槽大槽急切小嘈嘈帳下小番齊拍手越姬馬上醉葡萄我聞此曲何人度曲中有女將誰訴一聲似說漢明妃一聲似恨商人婦琵琶琵琶且莫彈齊竽楚瑟紛世間青草獨生孤塚上青衫何似淚澘澘青洲青洲野水瀦為塘塘頭高柳參成行漲痕過雨㣲風起柳色淡弄鵝兒黄波明煙煖春意足大鱗小鱗遊岸曲主人把釣成坐忘終日晴光泛蘋綠田父吟田家父作勞苦五更鷄鳴月當午呼兒鞭牛出蓬户翻犁南畞耕新土土沃泥深沒牛股田家父作勞苦朝櫛風莫沐雨舉鍤成雲齊耦伍沾體塗足身僂傴村南村北飛桑扈何如六月商羊舞田家父作勞苦有男在邊負弓弩不得歸家築場圃今年年豐多黍稌大半供輸入官府去年陳逋還未補田家父作勞苦如坻如京願倉庾日殺羔羊祀田祖鷄豚社酒喧村鼓擊壤高歌祝明主靜掃邊塵不用武但得年年太倉積紅腐我田作勞不為苦採桑婦朝採桑向東陌露花盈盈桑葉白暮採桑向西阡鷄栖已在桑樹顛菀彼柔桑採不盈筐高枝仰攀難入手低枝屈曲勾衣裳阿婆家中望葉歸蠶飢葉少歸來遲蠶成織絹作征衣征衣寄與塞上兒昨夜大兒寄書至書中㸃滴關山淚去年山東置老營今年又離山東去河北河南盡戰塵此身生死知何處採桑採得桑已枯蠶繭未成來索逋當門下馬意氣麤滿槖黄金呼阿奴使君得非是秋胡使君自有家中婦妾身豈必秦羅敷妾身自有塞上夫使君莫狂呼男兒當逺圖我願四海罷兵民力甦年年採桑養蠶供税租賦賞心亭送李止敬酌美酒賞心亭山川古形勝江左誇金陵鳳凰不飲啄草木皆彫零晉代衣冠乆岑寂謝家庭院多竛竮不聞玲瓏響玉樹但見霜臺老柏摩空青酌美酒賞心亭寒煙亂荒草落日明疎櫺酒酣兩耳熱浩歌醉未醒醉未醒浩歌為我呼寧馨蕨萁行原註閩清縣饑不報民采蕨萁為食而多死者作蕨萁行東山有蕨萁南山無蕨萁西山有蕨萁北山無蕨萁采采蕨萁晨露未晞荆棘離披筐筥擕持長鑱深入土短褐寒風吹采采蕨萁可以療飢以簸以炊為餳為飴食少不下嚥食多傷人脾去年歲歉食無糜橡栗拾盡民流離今年歲歉田無稗蕨萁食盡將安之美食太官饌仁心寧汝悲但見昨日奏麥兩岐今日進五色芝呈祥獻瑞無休時載膏載脂驛騎驅馳蕨萁蕨萁官獨不汝知己而已而歲云暮矣送林宗明調廣東掾君不見元龍老去氣尚豪醉卧百尺危樓高又不見淵明不為米折腰安肯束帶迎兒曹節槩由來重山嶽功名迺或輕鴻毛薦書期會相迫促吁嗟州縣人徒勞南山白雲不可招東海黄塵浩莫逃安得攀馭明月乘清飇與君八極同遊遨四明行寄臨海尹張惟彬君不見四明佳氣長鬱葱層巒疉巘摩蒼穹上有四窗鑿靈竅空濛杳靄開玲瓏丹山赤水洞天在淋漓紺碧雲霞重海上鯨鯢矗樓觀風煙有路蓬萊通劉樊夫婦上昇處至今絶頂丹臺崇火輪東出扶桑谷谽谺下走祥雲封蜿蜿蜒蜒獲福池滄波浸碧環鄮峯千秋琳館知章宅十洲島嶼真隱宫飇車鶴馭羣仙下珠璫玉珮聲磨礱乘槎遂有張公子丰標眉宇真喬松黄石素書非草草霓旌絳節行幢幢大府雄藩重然諾徘徊翠幙依芙蓉袖裏如椽五色筆文章煥爛流白虹紫電清霜補𤣥化瓊芝瑶草囘春醲簸弄日月兩湖水珊瑚倒影摇青紅我來逢人説斯善塵談亹亹生華風憶從束髮共交結遺編硯席朝暮同芸窗雪案乆磨琢蟾宮桂殿期相逢一朝寰海起黄霧人間蹤跡如飄蓬九年青山落君手我亦獨走閩嶠東二十餘年泛萍梗新豐歲月何怱怱歸來相看各老大未許試劒誇英雄豈知四野急烽火置身還自居兵戎玉帳分弓嚴虎旅燃犀照海驅蛟龍丈夫遭時各有異莫嗟文事趨武功君人作縣在鄉里勸課猶得隨桑農賣劍有人曾買犢讀書興學如文翁嗟我去年忝郡守逗留五馬將遊從池塘春草歸未得依然長劍倚崆峒懐人千里共明月昨夜書來猶夢中贈遺使我顔色好花帽細穿魚子椶瓊瑰乏報沈吟乆作詩聊附南征鴻
