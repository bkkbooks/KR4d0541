body:
  text: 羽庭集卷四元劉仁本撰七言律詩送四明録事陳子上歸鄉青燈夜雨幾論文别後江湖每憶君捷奏南宫新進士喜趨東郡作參軍蓬瀛滄海生塵霧雁蕩天台隔片雲薄宦不如歸去好邊城烽火正紛紜龍山水竹居愛此幽居水竹成玲瓏樓閣繞蓬瀛琅玕影浸玻璃碧鸞鳳飛來玉雪清煮茗不勞僧汲井截筒還有客吹笙我來倚檻題詩處萬籟風生月正明餘姚州汝仇湖履畝授田百頃仇湖接土塍扁舟獨泛雨冥冥前年戍海身曽到今日分田手自經逺近沙洲連水白高低麥壠入山青櫂歌一曲歸來晚林外旌旗駐馬聽寄金防禦令子文石叨陪防禦談戎事聞說成均令子材白璧一雙懷美器黃金千仞築髙臺片雲載雨江南去孤雁傳書海上來準擬明年二三月桃花浪暖聽春雷在錢塘夢作遊湖山詩羅浮春色染丹砂暫醉西湖處士家萬里長風吹短笛一鈎新月掛枯槎緑么翠鳳來瓊島銀闕珠宫散玉華但見飛仙飛縞帶不知是雪是梅花題大慈寺史丞相墓山行十里亂峯回相國墳塋紫翠堆石馬秋風兩翁仲杜鵑春雨幾亭臺慈雲塔下蒼苔滿旌德觀前紅杏開為憶當年蓴菜美短篷蘋末過湖來攸寧庵為茹孟德賦結屋南山孰相攸竹苞松茂白雲幽纍纍先塜牛眠地濯濯諸孫燕翼謀緑水園池重結構黃花杖策更優游傳家自有詩書舊茹美流芳在世修金鳳花為陳員外賦九苞異種來丹穴又見鶴林開鳳花雨露生成王者瑞雲霞變幻道人家梧桐竹實還相並朱草芝莖漫自誇政恨杜鵑啼血淚東風特為殿韶華答徐季章學正見寄韻聞君早習南華隱愧我來持使者麾嶺上白雲堪自悅袖中明月忽相遺時危總佩摧姦劎事定難磨詠史詩何日清颷斂黃霧衡茅風雨共棲遲送姪元法學正任滿我官分署浙江東咸姪隨行勝阿戎坐對芹宫聽夜雨夢回栗里動秋風青氊尚喜家兒在白髮遙憐吾弟同大父遲歸應已久諸孫惟汝愛偏隆雪篷為陳元昭賦道人錬得雪無瑕編竹為篷户不遮一曲清溪回剡棹半規明月浸蘆花候爐夜氣流丹蜃虛室神光飛白鴉我有冰田三萬頃共君何日泛靈槎題紅白梅花畫誰探海底珊瑚樹斜倚玉龍披玉鱗香影總沈寒水月色身分受艷陽春湖頭放鶴林和靖雪裏燒丹梅子真南國風光慨回首紅紅白白競精神送篤彥誠赴南臺照磨任三策當年覲聖顔聨翩鵷鷺立清班才持霜簡湖南去又駕雲帆海上還御史行臺開幕府蓬萊髙閣近家山姚江城下逢君别客路梅花不可攀具慶堂為樞密架閣李思冉賦八十慈親八十翁齊年髙壽未龍鍾疑行鳩杖雙扶出同拜鸞臺七品封有子綵衣供菽水居官翠幕泛芙蓉華堂具慶持春酒此樂人間不易逢癸卯新正次盛熙明見寄韻二首屢歲調軍戰鬪酣新年還復視廬菴中興業見車書一太極陽回象畫三瀚海鬼魂收白骨洞庭春色釀黃柑洛陽漫聽鵑聲急地氣由來自北南戰策功名夢已酣退休疑共結茆菴乾坤補報百無一歲月推移五十三文氣誰能催視草聖恩遙想賜傳柑白雲只在空明洞千里思親憶斗南餘姚白水宫瀑布二首白水真仙騎白龍何年蛻骨此山中化為玉蝀垂千尺翻却銀河落半空鶴夢曉遺明月帳鮫人夜掣水晶宫天台有客詩難就歸興瓊臺雙闕東中天飛瀑下瑤臺素練髙懸亦怪哉織女投機收不得姮娥剪水巧為裁光連雙闕星河動響挾千山風雨來祠宇洞前看未足又隨明月過天台上虞鳳鳴山仙洞飛泉真人洞口白雲深一𣲖飛泉掛壑隂不見丹臺威鳳下還開鐵筆老龍吟雷聲隱轉千鈞石雨意常含六月霖疑是棄遺鉛汞水化為氷雪灑人心題義貍卷原注四明胡用和生檻二貍其一逸去復來齧檻似援其不得共去者用和嘉其義遂兩釋之進士胡世佐為之傳人咸賦焉胡儂羅置兩山貍一黠偷生脫穽圍患難既同難獨免義恩有感得雙歸夜深月黑狼狐走秋後霜晴柿栗肥好向林間髙遁去更休貪著踏虞機孫蓍室講易世季文衰易已東乾坤幾息道屯蒙人從既役形骸後物蔽初生天地中三十六宫春氣轉百年萬數範圍同老仙獨坐神蓍室妙契當年太極翁寒碧亭為曇半雲上人題寒碧涵虛曙色分半溪流水半溪雲門前緑樹相轇轕屋上青山亂糾紛龍雨欲來崖削鐵蘋風微起浪成文老僧盥濯幽亭下獨坐心清香自薰宴荷亭新秋水木散清華倪氏池亭小似槎賓客倚欄看芡藕主人隔竹喚茶􅏨百壺酒盡烏紗墮四坐詩成白雪誇喜有山僧來入社逺公遺愛在蓮花釣魚軒為龍子髙賦溪山勝處卜居幽百頃滄浪一釣鈎換酒呼童將錦鯉放歌展席對沙鷗羊裘髙隱桐江上熊兆應懷渭水頭好共任公垂巨犗六鼇風雨海天秋題環溪孫元質松風軒環溪風撼萬松林似奏鈞天廣樂音翠節翩翻笙鶴下蒼雲撩亂水龍吟月生隂壑同靈籟人坐幽軒罷素琴我亦披襟來濯髮翛然激烈歲寒心題問月軒圓缺隂晴竟若何幽軒把酒問嫦娥天時皎潔光輝少人事參差感慨多關塞連年窺白骨蓬瀛萬里接銀河欲求蟾兔長生訣須泛靈槎斗畔過題秋月軒髙秋夜色淨如銀坐對幽軒看月輪多少隂晴圓缺恨消磨天地古今人屋頭仰見明河落鏡裏愁添白髮新欲泛靈槎覔靈藥要將風露洗風塵至日西樓宴客律轉黃鍾玉燭調初陽才動覺隂消誰能候氣如葭琯客有可人吹洞簫北信漫傳烏鵲喜東風獨放海棠嬌惜無魯觀書雲物空注丹心望闕遙十一月二十四日原注國典凡慶賀值雨雪即不具公服行禮旌旄拜舞千秋節遙祝儲宫憶帝畿萬里乾坤空在眼一時雨雪正霑衣龍樓問寢移仙仗毳帽函香滿禁闈關陜尚憐兵氣結西風望斷鴈南飛五言排律咏雪十八韻獻歲先三日豐年驗屢臻混元歸太素大塊敻無垠頃刻糢糊遍纎毫幻化勻瑰竒齊炫耀雕琢競精神十二珠宫燦三千縞袂純閭閻皆賈瑞山澤總呈珍傅粉誇光寵堆藍厄後塵青尖藏馬耳白戰蛻龍鱗樓閣移清觀瓊瑤衒大鈞冰凝詩硯鐵水瀉瓦溝銀孤鴈嗷求侣飢鷹攫近人清池鵝影亂怪石虎形踆詠絮才堪擬觀梅韻逼真微吟動東閣清夢隔南閩閉户從髙卧映書寧厭貧仁風回坱圠元氣返氤氲意思窗前學胚胎地底春詩成語田父喜色動津津建寧北元噉山造茶是日天大雷雨髙奉御至建溪三十里北苑擅茶名地聳嵓巒秀川回瀧瀨縈溪山元藴瑞草木亦敷榮逺土職修貢官曹任𣙜征君恩濡澤降天助震雷轟鼓譟千軍勇喧豗萬蟄驚仙靈煩酒醴使者引旗旌白玉堂前客紅雲島內行靈根連夜發凡草感春生漸覺龍芽吐先期鳳觜萌邏巡分堠卒掇拾課山丁紫筍和煙採金筐帶露盛槍旗俄錯落粟粒迸輕盈散亂碧濤影玲瓏玉杵聲雪香金碾碎雲冷石泉泓軒翥鸞凰瑞參差圭璧呈團團明月起隱隱翠蛟嶸包匭殊科第封函致潔精薦新誇絶品馳貢入神京上為君王壽下攄民物情武夷同譜牒禹貢孰稽程陸羽千年夢盧同兩腋清廟堂真燮理黍稷享精誠賦羡無遺物科徵念逺氓彤雲閟山谷絢日隔蓬瀛願以陽春德千秋奉聖明代虞江宴别詩隂字韻行役方趨陛朋從喜盍簮自憐循宦轍及命掌詞林報國丹心在頻年白髮侵金鑾還召對玉節尚遙臨東壁星纒瑞南溟海氣深靈槎須犯斗閶闔啓層隂贈姪郭元亮郭氏承劉𦙍汾陽續沛豐舅甥因好合氣脈始相通瓜瓞同曽祖螟蛉自我翁事殊三世後居隔片雲中深慮婚姻雜遂謀祠祭同尚懷髙魏族不愧鶴山風我去家鄉久汝來恩意隆分雖存伯姪服已殺朞功自匪親兼義誰能逺即戎既然情懇懇胡乃别匆匆愛爾雙瞳漆悲余兩鬢蓬家聲當振勵學力貴優充杯酒殷勤敘行囊遺贈空作詩聊勉誨極目送歸鴻七言排律汀漳平寇回軍至福州建黃籙大齊醮于東嶽帝之行宫賦二十二韻老君臺上清光近壇壝崇嚴翼泰山道化𤣥微沖漠際天人交㑹感通間雷霆叱咤神官集河漢昭回星曜環五色寶光浮紺碧三台華蓋擁朱殷指揮剡剡幡旟矗扈衛森森劍㦸閒一念精誠祈陟降百靈竦息制邪姦太清聖境金銀闕上界仙曹玉筍班明月笙簫鸞舞下冷風環珮鶴飛還蛟龍並出扶雙輦虎豹齊驅闢九關瑞結靄煙飄旖旎輝騰奎壁絢斑爛緑章封進雲霞篆黃道重開日月闤絳節徘徊齊接引朱宫縹眇獨躋攀鳳翬麟趾承丹扆寶衱珠瓔侍翠鬟飛步魁罡旋斗口肅趨殿陛拜天顔齊薰肅蕆清修事感格殊深惠澤頒矯矯帥臣親奉檄桓桓師旅出征蠻痛兹禍孽塵氛惡啓我戎行甲胄擐殞命捐軀哀士卒戮尸暴骨愍凶頑漫漫長夜幽冥隔慘慘昏霾風雨澘仰迓泰階霑福祉同躋壽域罔恫瘝協和坐致隂陽理康濟應思民物艱遂勑伊祈司下土靄然春盎滿塵寰杭州南山水樂洞石屋寺前一徑通南山秀色開雲封谽谺石洞藏幽怪的皪銀河當要衝萬竅風煙如斧鑿五音水樂鳴琤琮軒轅不祕鬼神泣律吕相宣日夜舂崖骨淋漓生凍蘚土花剝蝕緣枯松雲邊樓閣逢僧指眼底風雷蕩我胸為囑奚奴毋飲馬應知此地有眠龍窮觀更陟煙霞嶺一嘯攀摩象鼻峯題南唐惠崇逺景畫卷惠崇毫素出天機貌得瀟湘景物歸極目滄洲生逺趣平川秋思淡晴暉寒煙斷岸巴陵曲野水枯槎黃鶴磯渚鳥沙禽來簇簇江蓮葆羽淨依依鵁鶄屬玉爭羣聚鸂鶒鳬鷖散漫飛隨意回翔隨飲啄或相親近或依違浪花浩蕩鷗波闊叢葦蕭踈鴈陳圍亂植蒲篁迷浦漵列行汀樹鎖煙霏枝頭倦翼風還靜石角滋芳露欲晞睥睨閒情齊物化胚胎元氣幹𤣥微想當意匠經營際妙奪神工取次揮曽是江南夸品絶忽驚眼底見來稀摹臨不羡雙鈎筆盤礴何當一解衣添却武陵漁艇子桃花流水鱖魚肥五言絶句題羅稚川小景畫四首白鷺聨拳靜蒼松並幹齊桃花無數發疑是武陵溪出水新蒲短和煙翠柳深一雙黃鳥並斷岸聚文禽紅葉迷煙樹黃蘆間白蘋江南秋色裏還有鴈來賓怪石蹲鹽虎枯槎掛玉龍飢烏相並立無處啄寒蛬雙松圖風雨生巖壑冰霜耐歲寒終為棟梁具莫作畫圖看洗馬䓗嶺來呈瑞昆明已息波將軍回玉鞚壯士挽天河逸馬玉花出御榻飄逸如飛鳳奚官試錦韉神驚不受控飲馬琨池飲寒玉照眼雪花明聞說長城窟年年水亦清原注飲馬處澗名水清故云明妃曲四首和親誠上計安用漢將軍粉黛無顔色丹青有策勳辭别君王去邉中要結親只愁渠眼大不見漢宫人一曲琵琶淚金鞍細馬䭾休言妾命薄不及漢恩多未坐邉塵帳猶懷漢守宫君恩儻可續妾貌自無同來鶴亭結構萬松頂悠然一小亭月明雙白羽飛下秋冥冥奉林道院仙人劉奉林騎鶴上天去何年有祠宇雲蘿鎮蒼翠劉彥芳畫像寄傲林泉客逍遙自在身山童白羽扇流水石橋春新塋北顧行𤣥武平原下飛鳳我營霜露宅僻近仙人洞文獻書院文翁宗道學清獻有詩傳禮樂存千古祠庭拜二賢老馬天寒苜蓿短病骨怯西風先帝親征日曽多汗血功西江長江流不盡盤曲繞山西潮生復潮落漁舟繫柳堤水墨梅花七首杖藜冰雪底清興與誰同好約林和靖來尋陸放翁踈花三兩㸃老骨一枝斜明月西湖上清風處士家一枝斜蘸水淡月正黃昏為問西湖上誰招處士魂西湖人放鶴東閣客吟詩冰雪生清興梅花只自知閲歷冰霜久山顛共水涯東風吹畫角奈此老槎牙䥫幹踈花淡緑毛么鳳雙道人清夢斷明月下寒窗冰霜和雪月何處看枯槎載得林和靖題詩湖水涯七言絶句建上四景白鶴峯朝五鳳樓紅塵隔斷水東流通仙橋上多車馬二月游人出建州丹青閣上紫芝峯十里長橋似卧龍水隔城南多少寺樓臺煙雨鎖重重玉青洞口緑楊堤雲滿沙堤水滿溪有客泛舟明月下何人橫笛畫橋西緑樹隂濃鎖幔亭北來流水護重城紫霞洲上神仙宅時有月明笙鶴聲漁翁魚穿柳葉來沽酒櫂入蘆花不繫船兩岸江山誰是主一蓑煙雨對鷗眠題萱草竹圖幽幽萱草樹堂隂慈竹堂中慈母心漫為忘憂永相託倚門欲聽鳳凰吟梅姑射仙人氷雪姿翛然對客愛吟詩月明寄得江南信還憶西湖放鶴時題枯木竹石老樹槎牙枝葉乾幽篁新長小琅玕頽然一片堅真石好共先生耐歲寒枯形秃髮亂毿毿山中喚作木瞿曇石徑無人秋月白一枝笻竹倚江南贈白雲上人住龍泉寺餘姚城下水漣漣萬鍤深壕古寺邊一片白雲留不住曉來將雨過龍泉餘姚城下萬軍屯一曲江流兩岸分好是陽生長至日龍泉山頂看書雲題梅花卷玉龍一曲動江城萬斛珠璣照眼明羅浮道人清不寐梅花枝上月三更題水墨折枝梅頷下神珠照眼明老蛟蛻骨月華清夢回鐵石心腸事還寫梅花憶廣平題畫繁梅晴昊繁花開遍時畫工淡墨寫離披如何不㑹冰霜意亂作南枝與北枝寄梅圖萬木凋零霜雪摧孤芳昨夜領春回驛頭消息慿誰寄須待緑毛么鳳來題袁安道梅花卷綵筆生春奪化工東風不得夀陽宫冰肌玉骨精神處絶似袁郎卧雪中題青山白雲畫天際青山千萬重磎頭緑樹夏隂濃白雲却在羣峯外隱約飛泉挂玉龍題孟浩然騎驢畫賈島苦吟衝大尹淮陰䭾醉謫神仙雪中一段清竒事輸與襄陽孟浩然雙松閣石峽中間兩怪松蟠枝直幹翠重重山人别後多風雨他日歸來已化龍贈鐫字李顯中昭代幸無朋黨籍磨崖還有中興碑李生一寸豳州鐵好為元勛勒鼎彛題棠梨三禽圖棠梨小樹飛山鵲荆棘橫枝兩白頭卉木羽毛同造化春風樂意自相酬雙鵲圖畫圖雙鵲立枝髙日日相看慰寂寥好在堂前頻報喜不愁天上役成橋題春樹暮雲圖春深渭北題詩處雲壓江東載酒船一夜相思人不見屋梁落月共嬋娟題冬景山水屋頭崖壑懸冰練雪後峯巒似削銀何許幽人清興足抱琴來看玉璘珣題書隱圖屋頭流水溪頭樹山外白雲橋外村何處讀書開竹檻有人載酒過柴門題嚴瀨風煙圖太史眼中星斗動先生腳下水雲寬漢家二百中興業只在桐江一釣竿題息齊枯木竹石圖葆羽玲瓏集鳳阿修然蒼節倚枯槎玉堂仙子清如許寫得瀟湘秋思多題青山寺書樓畫壁二首雙徑行來五朵峯白雲深處梵王宫何緣圖在書樓上秪為曽留古鼎翁湖上青山山上樓老僧獨坐白雲幽何人收拾筆鋒裏散作淋漓元氣浮送顔右丞赴都别酒醺醺雨作晴故人心共海霞明雲帆駕得天風健萬里扶搖上玉京題宋祖蹴踘圖曽見忠言論擊毬轉圜從諫喜如流誰知蹴踘俳優戲踢動乾坤四百州雜詠三首海島癡雲紅作陳山林漲雨緑成圍閉門東郭憂不出松江主人何日歸潑墨濃雲徹大隂沈沈閶闔九重深憂天每作杞人夢填海空懷精衛心東南漲海風波惡西北天傾雨露寬我亦未能明此理出門仰視雪成團次經略使李治書遊空明洞天韻夜宿空明道士家煉臺丹氣濕青霞步虛聲響隨明月來向天壇作散花香燒明月淡秋雲方石亭前坐夜分見說洞深瀛海近昔年曽有櫓聲聞過茶洋驛次李憲副詠飛雪亭韻二首老僧曽弄銀河水愛此飛泉便作亭料是九天收不住故將氷雪灑南溟何處月明風雨急泉聲一𣲖掛槎川奔流直入劒津去驚起雙龍夜不眠感事西風一夜到林巒無數秋聲在樹間獨有啼烏栖不定踏翻明月滿空山題趙子昻馬圖番奴毳帽赭衣新萬里牽來覆錦裀華萼樓前呈御榻翻身曽見衮邊塵原注寧王為明皇帝畫六馬滚塵圖于華萼樓壁上題曹録判所藏將軍霸馬圖尾撒流星首渴烏靈源神草幾番枯一從飛入瑤池去化作君家獨駿圖題支遁與許詢王逸少看馬圖山僧愛馬非愛馬奈此天機神駿何空忝許詢同一顧還似蘭亭喜弄鵝題劉商觀奕圖當年曽過柯山下石洞棊枰苔蘚班仙子不知何處去空傳遺跡在人間延平驛二首劒潭千頃淨無垠岸曲樓臺架水雲半夜風雷吼神物三川星斗印天文延平驛畔古鐔津繞郭青山亂糾紛幾度官舟泊沙尾鷓鴣不忍隔江聞題扇面贈李司儀回京落花零亂燕呢喃萬里修程一短驂好向五雲深處去玉簫吹徹望江南題扇面送友人回京三首兩年為客留南海一日歸家上北船白髮故人相見好黃金臺上九重天五月南風送客舟水雲萬里接蓬丘道人不唱凌波曲飛上瓊瑤十二樓中原草木已成隂萬里江南一寸心後夜相思何處月黃河泰華極髙深帥閫夜直官栁青青鎖署門官中無事又黃昏銅壺漏箭傳三刻月浸芙蓉玉一痕題馬易之觀光行卷雲林圖雲山歷厯畫圖開老樹蒼蒼梁棟材無限江南春意思越中詩客帶將來括蒼省覲二首曽向三山跨鶴回又尋處士括蒼來白雲只在好溪上引出青蓮萬葉開一葉扁舟上括蒼石門洞口月昏黃青田野鶴歸來晚七十二灘煙水長答趙德純馬藺花山中水竹愛深居長日幽人自讀書案上小花名馬藺相親喜得兩相如題松石道人像片石堅貞氷玉操長松偃蹇歲寒心道人自得幽閒趣石上松間把素琴題陸放翁齊安墨迹原注俯仰宇宙茫茫陳迹前修不可見矣猶因其遺墨而可想其丰儀者寧不重有感乎越上曽過陸氏莊風煙月露水雲鄉今朝忽睹題詩迹重憶坡仙舊雪堂題慈湖楊先生墨迹慈湖春水發淵源仰止先生道德尊手澤有人藏翰墨片言隻字尚堪論題畫重重巖壑白雲門上有仙人禮斗壇俯瞰洞庭聨左蠡長風萬里起波瀾江上春光照眼眀神仙樓觀出丹青武夷九曲差相似若箇中間大隱屏兩岸青山遮古道一篙春水棹孤舟蒼煙暝色歸鴉晚猶有行人立渡頭夏日村中芳樹依依鎖翠烟小池荷葉緑鋪錢醉人曉起朦朧眼錯認榴花作杜鵑題溫日觀畫葡萄日觀山頭有老僧葡萄幻出墨稜層維摩不坐真珠帳引得狐禪語葛藤書便面贈禪寂寺一𤣥上人山僧野客共襟期對榻吟詩夜漏遲萬竹庭前秋雨過紫微花下月明時原注寺多竹紫嶶花甚茂水西寺訪空上人溪虛雲靜雨初收松竹涓涓翠欲流窗外落花春已莫一聲啼鴂隔沙洲小箬站二首小箬渡頭潮水來西風嫋嫋片帆開篙師為我輕移槳莫使前灘鷗鷺猜昨夜扁舟水口灣今朝驛路擬盤桓却貪兩岸峯巒好不憚撑篙逆上灘陪建寧太守宴水南樓索贈歌者二首兩岸垂楊鎖翠樓玉人歌舞錦纒頭海棠枝上東風軟銀燭燒殘月半鈎寶篆香燒酒欲醒一聲歌徹綵雲凝朱轓五馬樓前月人在重雲第幾層再陪宴用前韻夜月春風燕子樓佳人擊碎玉搔頭天涯芳草無消息塵滿朱簾懶上鈎香醺宿酒未全醒坐對冰壺玉露凝月落翠消人散後綵鸞飛上最髙層贈陳雲舟一片飛來壓柁樓有人擊楫坐中流無心去作他山雨滿載江南萬斛秋平江迎詔玉京春信阻佳期十月江南歸鴈遲天上暗滋新雨露吳中重覩舊官儀題十牛圖或行柳外或陂陀度水相呼或寢訛春草幽幽春雨足何人更唱短衣歌木芙蓉畫光浮仙掌露華濃香滴丹砂暈玉紅太液池邊秋月白參差霞佩倚西風寄題永樂寺永樂寺前江水深隔江遙見白雲岑梅花帳底僧未起官舟帆影月初沈永樂寺前江水橫潮落五更殘月明詩人每負山僧約不來亭上看雲生九月十一日遣內還家為子畢姻二首博山香透近簾櫳阿母青鸞信息通風定銀床秋夜靜夢回涼月在梧桐大父年髙載受封阿孫授室翠幃重山妻兒女團欒處老我家鄉夢裏逢簡葛錬師月明一陳過雲雨夜半凉生枕簟風起坐石闌無箇事翛然秋信下梧桐贈羽士周敬存道士今非丁令威一林烟雨自吟詩午炊不作青精飯留客同參玉版師贈北髙峰趺坐道人梅花紙帳小蒲團好在髙峰頂上安夜半忽聞孤鶴唳一輪明月寶光寒題天囦上人扇面竹院相尋秋意多道人無奈月明何不騎白鶴須黃犢却寫黃庭換曰鵝宫詞宫樹風微玉簟凉錦衣小隊過川廊曲闌干外梧桐月照見銀篝曉夜香舞靴輕轉玉階前憶昔承恩已十年記得當時供奉曲上皇親自月宫傳恩從內殿賜茶還剩得龍團月半彎手挹瑤瓶注溝水香分涓滴到人間內賜回來隨例恩芙蓉葉上月黃昏銀燈雙引氊車過擁入紅雲第二門慈溪東皋茶亭詩試問東臯老萬回道傍築室為誰開登程客已喫茶去渡水人從彼岸來題寧溪圖用毛儀仲韻七首寧溪巖壑古風煙舊住人家不記年隔岸小山三四㸃娥眉終日淨娟娟萬壑風煙撥不開宛然雙闕對瓊臺吹笙子晉今何在石橋流水似天台桂子花開水滿堤青山兩岸與樓齊有客醉歸明月下十里天香送馬蹄蒼煙落日小漁舟溪北溪南載我遊遊到王家逺庵下白雲深鎖舊梧楸一丘一壑水雲間欲作淵明歸去難五馬雙魚相對好秋風寫入畫圖看溪流一曲繞村莊溪山十里野花香溪畔飲牛人度水溪頭女子採柔桑溪人種竹滿溪頭載酒吟詩溪上遊寄語溪居王少府何人得似渭川侯登福州南臺廟三首原注廟乃無諸氏生嘗以步騎從番君助漢滅秦死後廟食焉把酒髙歌閩越臺暴秦炎漢總成灰至今猶見屠龍處山挾江頭風雨來釣龍臺上幾登臨閩粵江山無古今啼鳥落花春事靜滿城荔子緑隂隂釣龍臺下水平堤荔子樓前繫馬嘶不見無諸宫苑舊空林還有鷓鴣啼次韻寄盛熙明藥苗芝草淨纎纎酒熟黃精石蜜甜紫府靈丹通火候紅爐飛雪白於鹽流水潺潺泛落花誤因採藥到仙家歸來幾換人間世回首雲深路已賖跋余忠宣公詩余公髙誼薄青雲激烈成吟贈隱君十載淮西能死節看詩欲作誄忠文過髙起文幽居粉蝶羣飛入菜花柔金碎玉亂交加天然富貴春風裏屬在長城野老家山居修竹柴門閉不開山中無事少人來一樽魯醖堪留月數首新詩總為梅鄞江送别兩岸青山照眼明風林行李别離情絶憐舟子來催發報道江頭潮已生嚴瀨圖百頃風煙一釣絲雙松挺挺歲寒期嚴陵只在桐江上千古難描嵒壑姿折桂枝仙子翩翩環珮輕廣寒宫殿月華清桂林折得一枝下好對昆山片玉明塞下曲錦帽貂裘小隊分蒲萄馬上醉昭君銀箏夜坐彈明月玉帳秋髙獵陳雲帳壓寒雲雪未消羽林圍獵試弓刁滿斟白湩燒黃鼠仰看青天射黑鵰閩中女四首原注閩之人泛海入番十餘年不歸其妻訴之述其言為賦閩中女兒顔色嬌雙雙鸞鳳織鮫綃織成欲寄番船去日日江頭來候潮海南番舶盡回鄉不見儂家薄幸郎欲向船頭問消息荔枝樹下買檳榔當時郎著淺番衣淺番路近便回歸誰知却入深番去浪逐鴛鴦逺水飛象犀珠翠海南香萬里歸來水路長薄幸又從何處去十年海外不思鄉
