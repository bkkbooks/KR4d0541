body:
  text: 提要羽庭集六卷别集類四元臣等謹案羽庭集六卷元劉仁本撰本字德元天台人以進士乙科歷官溫州路總管江浙行省左右司郎中時方國珍據有溫台諸郡招延士大夫仁本入其幕中參預謀議國珍嵗治海舟輸江淮之粟於大都仁本實司其事其所署者郎官蓋即元所授故集中諸作大都感慨阽危眷懷王室其從國珍蓋欲借其力以有為徐圖興復亦如羅隱之仕吳越實心不忘唐觀其贈李員外自集慶回河南詩云漢兵早已定中華孫述猶鳴井底蛙於明祖顯然指斥其志可知厥後國珍兵敗仁本就擒抗節不撓至鞭背潰爛而死則仁本終始元人未嘗一日入明永樂大典題曰國朝劉仁本非其實也仁本學問淹雅工於吟詠多與趙俶謝理朱右等倡和嘗治兵餘姚作雩詠亭於龍泉左麓仿佛蘭亭景物集一時文士修禊賦詩自為之序其文雖不見於集中而石刻今日猶存文采風流可以想見故所作皆清雋絶俗不染塵氛其序記諸篇述方國珍與察罕通使及嵗漕大都諸事多記所不載亦可補史闕原本久佚謹就永樂大典所載以類編次釐為詩四卷文二卷仍改題曰元劉仁本以存真焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序天台之山下盡東海者曰黃巖其别峯走曠原而秀者曰委羽委羽山之人有曰劉德玄者頎然而清黝然而玄飄然有遺世之念自壯時愛讀揚子書所為文往往有類而或過之後涉艱棘履險厄而作又益進其雄篇也浩浩焉不可端倪其小章也幽幽焉又不可破裂噫非玄微之理存于心其所發者能如是歟余嘗即其人與之語矣因疑其山川之氣清淑者盡萃其身而又能養之全守之固而益充故其山立而水行雲興而霆擊星辰之布列雨露霜雪之滋悴鬼神之冥顯人物之昭煥有若天地之所以化生萬彚而非人力之可及文之玄果若是否乎玄之理在其身有非他人之測識者或謂揚子雲行有所不逮然其文又非後進所能擬是則所著太玄經果玄乎果非玄乎德玄果知之乎余豈得而議之今輯所為文號曰亦玄孰曰不可不然後世有劉德玄者必好之矣軒轅彌眀自衡山來愛其文也故馮物而序之重為歌曰悠悠太虛孰可馮我欲馮之氣所乘坎壈窒盩紛不成精明純白道自寧天台半落黃山青山中老人劉羽庭吟詩作賦如建瓴軒轅道士來相迎袖中出我亦玄經起伏萬狀不得名為歌此曲山月明宋無逸序自序至正癸卯之冬十月余被戎事過上虞主胡師德氏有栁生泰者謁求栁莊詩遂口占授之既而朱君伯賢曰生能致鬼神為文詞多奇詭即挾入密室請賦白雲巢篇余方與客詹國器陳惟敬劉坦之僧震雷隱昱大明及胡生璉立談頃伯賢亟出曰若有降靈馮于物者自稱為韓愈氏即軒轅彌明書諸几曰聞羽度公能文章敢請見教邀余及衆客入室余辭以無與似者大明取余近製守拙齋記一篇質諸神神使誦之若有聽焉既終誦乃書曰善則善矣獨中間熙字誤此吾淮西碑中語也當作嬉衆皆驚愕又書曰羽庭公近著亦玄集吾請為之序可乎凝神入思頃刻附筆立就辭語絶類韓子體製因憶向在庚子正月間夢偕士友論文俄而見巍冠博帶者馮虛陟降謂余曰吾昌黎韓愈也授以片楮楮中有云文以載道道有顯晦文亦為之低昻道在日用間文貴平暢則道自然明白文猶製衣也挈其領而褫之理斯順矣覺而記憶嘗以語卓君習之宋君無逸今序中乃曰吾嘗即其人而語之矣斯言似有吻合乎前者噫蘇文忠公作昌黎潮州廟碑謂公之神在天下如水之在地中無所往而不在又謂不依形而立不恃力而行不待生而存不隨死而亡者誠哉言也豈余亦嘗信之深思之至焄蒿悽愴若或見之邪故不得遺置輒録諸編左以備觀覽幸毋訝其迂誕焉是年月既望天台劉仁本書
